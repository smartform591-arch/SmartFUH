<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>SmartFuh | Reportes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #4a2c2a; --accent: #e89c2c; }
        body { margin: 0; background: var(--brand); color: white; font-family: 'Inter', sans-serif; padding-bottom: 110px; }
        #videoBG { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: -1; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; }
        
        /* Barra de navegación inferior */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; height: 75px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            border-radius: 30px; display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); z-index: 1000;
        }
        .nav-item { color: #718096; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: 800; text-decoration: none; width: 60px; }
        .nav-item.active { color: var(--brand); }
        .nav-item i { font-size: 20px; margin-bottom: 3px; }
        
        .nav-center-wrapper { position: relative; top: -28px; }
        .nav-center {
            width: 62px; height: 62px; background: var(--brand);
            transform: rotate(45deg); border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 3px solid var(--accent);
        }
        .nav-center i { transform: rotate(-45deg); color: var(--accent); font-size: 24px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="videoBG"><source src="12345.mp4" type="video/mp4"></video>

    <header class="p-6 pt-12 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-black italic">REPORTES GLOABLES</h1>
            <p class="text-[10px] uppercase opacity-60 font-bold tracking-widest">Resumen de actividad</p>
        </div>
        <div class="w-10 h-10 glass flex items-center justify-center">
            <i class="fa-solid fa-chart-line text-orange-400"></i>
        </div>
    </header>

    <main class="px-6 space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-5">
                <p class="text-[9px] font-bold opacity-50 uppercase">Total Encuestas</p>
                <h3 id="total-encuestas" class="text-3xl font-black text-orange-400">0</h3>
            </div>
            <div class="glass p-5">
                <p class="text-[9px] font-bold opacity-50 uppercase">Respuestas Recibidas</p>
                <h3 id="total-respuestas" class="text-3xl font-black text-green-400">0</h3>
            </div>
        </div>

        <section>
            <h3 class="text-xs font-bold opacity-50 uppercase mb-4 tracking-widest">Últimas Participaciones</h3>
            <div id="lista-respuestas" class="space-y-3">
                <div class="text-center py-10 opacity-30 italic text-sm">Cargando datos...</div>
            </div>
        </section>

    </main>

    

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function cargarReportes() {
            try {
                // 1. Contar Encuestas
                const encuestasSnap = await db.collection('encuestas').get();
                document.getElementById('total-encuestas').innerText = encuestasSnap.size;

                // 2. Contar y Listar Respuestas
                const respuestasSnap = await db.collection('respuestas').orderBy('fecha', 'desc').limit(10).get();
                document.getElementById('total-respuestas').innerText = respuestasSnap.size;

                const container = document.getElementById('lista-respuestas');
                container.innerHTML = '';

                if (respuestasSnap.empty) {
                    container.innerHTML = '<p class="text-center opacity-40 py-5">No hay respuestas aún.</p>';
                    return;
                }

                respuestasSnap.forEach(doc => {
                    const r = doc.data();
                    const fecha = r.fecha ? r.fecha.toDate().toLocaleDateString() : '---';
                    
                    container.innerHTML += `
                        <div class="glass p-4 flex items-center justify-between border-l-4 border-orange-400">
                            <div>
                                <h4 class="font-bold text-sm text-white">${r.usuarioNombre || 'Anónimo'}</h4>
                                <p class="text-[10px] opacity-60">Respondió: ${r.tituloEncuesta || 'Encuesta'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-black opacity-40">${fecha}</p>
                                <button onclick="verDetalle('${doc.id}')" class="text-[10px] text-orange-400 font-bold uppercase mt-1">Ver detalles</button>
                            </div>
                        </div>
                    `;
                });

            } catch (e) {
                console.error(e);
                document.getElementById('lista-respuestas').innerHTML = "Error al cargar reportes.";
            }
        }

        function verDetalle(id) {
            alert("ID de Respuesta: " + id + "\nPróximamente: Visualización detallada de respuestas.");
        }

        cargarReportes();
    </script>
</body>
</html>
