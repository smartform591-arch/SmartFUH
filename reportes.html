<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmartFuh | Analytics Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #1a0f0e; --accent: #e89c2c; }
        body { 
            margin: 0; background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; padding-bottom: 100px; 
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }
        
        #bg-image {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background-image: url('fondo de login.jpeg'); 
            background-size: cover; background-position: center;
            filter: brightness(0.3) contrast(1.1); z-index: -1;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 28px; transition: 0.3s;
        }

        /* Micro-interacciones */
        .report-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .report-card:active { transform: scale(0.96); background: rgba(255,255,255,0.08); }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Skeletons */
        .skeleton { 
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); 
            background-size: 200% 100%; animation: loading 1.5s infinite; 
        }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        #detail-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 10000; display: none; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(15px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input::placeholder { color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <header class="p-8 pt-16 flex items-center justify-between sticky top-0 z-50 bg-gradient-to-b from-[#1a0f0e] via-[#1a0f0e]/80 to-transparent">
        <div class="flex items-center gap-4">
            <a href="inicio.html" class="w-12 h-12 glass flex items-center justify-center text-white active:scale-90 transition-transform">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">Analytics</h1>
                <p id="live-status" class="text-[9px] font-black text-orange-400 tracking-[0.2em] uppercase flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-orange-400 rounded-full animate-pulse"></span>
                    Sincronizado
                </p>
            </div>
        </div>
        <button onclick="cargarReportes()" class="w-12 h-12 glass flex items-center justify-center text-orange-400 active:rotate-180 transition-transform duration-500">
            <i class="fa-solid fa-arrows-rotate"></i>
        </button>
    </header>

    <main class="px-6 space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 border-b-4 border-orange-400/50">
                <p class="text-[8px] font-black opacity-40 uppercase mb-2">Total Módulos</p>
                <h3 id="total-encuestas" class="text-4xl font-black italic tracking-tighter">--</h3>
            </div>
            <div class="glass p-6 border-b-4 border-emerald-400/50">
                <p class="text-[8px] font-black opacity-40 uppercase mb-2">Sincronizados</p>
                <h3 id="total-respuestas" class="text-4xl font-black italic tracking-tighter">--</h3>
            </div>
        </div>

        <section class="space-y-3">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-orange-400/30"></i>
                <input type="text" id="buscador" oninput="filtrarReportes()" 
                    placeholder="BUSCAR AGENTE O REPORTE..." 
                    class="w-full glass bg-white/5 py-5 pl-14 pr-6 text-[10px] font-black uppercase tracking-widest outline-none focus:border-orange-400/50 transition-all">
            </div>
            <div class="flex gap-2">
                <button onclick="exportarCSV()" class="flex-1 glass py-4 flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i class="fa-solid fa-file-export text-orange-400"></i>
                    <span class="text-[9px] font-black uppercase">Exportar CSV</span>
                </button>
                <button onclick="window.print()" class="glass px-6 py-4 active:scale-95 transition-all text-white/40">
                    <i class="fa-solid fa-print"></i>
                </button>
            </div>
        </section>

        <section class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h3 class="text-[10px] font-black opacity-40 uppercase tracking-[0.3em]">Registro de Campo</h3>
                <span class="text-[9px] font-bold opacity-20" id="counter-label">Mostrando: 0</span>
            </div>
            
            <div id="lista-respuestas" class="space-y-3">
                <div class="skeleton h-20 rounded-[28px]"></div>
                <div class="skeleton h-20 rounded-[28px]"></div>
                <div class="skeleton h-20 rounded-[28px]"></div>
            </div>
        </section>
    </main>

    <div id="detail-modal" onclick="event.target == this && closeModal()">
        <div class="glass w-full max-w-md overflow-hidden flex flex-col max-h-[85vh] shadow-2xl border-white/10">
            <div class="p-8 border-b border-white/5 flex justify-between items-start">
                <div>
                    <span class="text-[9px] font-black text-orange-400 uppercase tracking-[0.2em]">Metadata del Sistema</span>
                    <h2 class="font-black italic text-3xl uppercase tracking-tighter leading-none mt-1">Detalles</h2>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div id="modal-content" class="p-8 overflow-y-auto space-y-6 no-scrollbar bg-black/20">
                </div>

            <div class="p-8 pt-4">
                <button onclick="closeModal()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] active:scale-95 transition-transform">
                    Cerrar Revisión
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let DATA_CACHE = [];

        async function cargarReportes() {
            const container = document.getElementById('lista-respuestas');
            const liveStatus = document.getElementById('live-status');
            liveStatus.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>Sincronizando...`;
            
            try {
                // Consultas paralelas para velocidad
                const [encuestasSnap, respuestasSnap] = await Promise.all([
                    db.collection('encuestas').get(),
                    db.collection('respuestas').orderBy('fecha', 'desc').get()
                ]);

                document.getElementById('total-encuestas').innerText = encuestasSnap.size;
                document.getElementById('total-respuestas').innerText = respuestasSnap.size;

                DATA_CACHE = respuestasSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderizarReportes(DATA_CACHE);

                liveStatus.innerHTML = `<span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Online`;
            } catch (e) {
                console.error(e);
                liveStatus.innerHTML = `<span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> Error de Red`;
            }
        }

        function renderizarReportes(lista) {
            const container = document.getElementById('lista-respuestas');
            document.getElementById('counter-label').innerText = `Mostrando: ${lista.length}`;
            container.innerHTML = '';

            if (lista.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center opacity-20">
                        <i class="fa-solid fa-folder-open text-4xl mb-4"></i>
                        <p class="text-[10px] font-black uppercase">Sin registros coincidentes</p>
                    </div>`;
                return;
            }

            lista.forEach((r, index) => {
                const f = r.fecha ? r.fecha.toDate() : null;
                const fechaStr = f ? f.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' }) : '---';
                const horaStr = f ? f.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }) : '';
                
                container.innerHTML += `
                    <div class="glass p-5 flex items-center justify-between report-card fade-in border-l-4 border-orange-400/20 hover:border-orange-400" 
                         style="animation-delay: ${index * 0.03}s" 
                         onclick="verDetalle('${r.id}')">
                        <div class="flex gap-4 items-center overflow-hidden">
                            <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center shrink-0">
                                <i class="fa-solid fa-file-lines text-orange-400 text-xs"></i>
                            </div>
                            <div class="truncate">
                                <h4 class="font-black text-[11px] uppercase tracking-tight text-white truncate">${r.usuarioNombre || 'Anónimo'}</h4>
                                <p class="text-[9px] opacity-40 font-bold uppercase truncate">${r.tituloEncuesta || 'Módulo General'}</p>
                            </div>
                        </div>
                        <div class="text-right shrink-0 ml-4">
                            <p class="text-[10px] font-black text-white">${fechaStr}</p>
                            <p class="text-[8px] font-bold text-orange-400/50 uppercase">${horaStr}</p>
                        </div>
                    </div>
                `;
            });
        }

        function filtrarReportes() {
            const query = document.getElementById('buscador').value.toLowerCase();
            const filtrados = DATA_CACHE.filter(r => 
                (r.usuarioNombre || '').toLowerCase().includes(query) || 
                (r.tituloEncuesta || '').toLowerCase().includes(query)
            );
            renderizarReportes(filtrados);
        }

        async function verDetalle(id) {
            const content = document.getElementById('modal-content');
            content.innerHTML = `<div class="py-10 text-center"><i class="fa-solid fa-spinner animate-spin text-orange-400 text-2xl"></i></div>`;
            document.getElementById('detail-modal').style.display = 'flex';

            try {
                const data = DATA_CACHE.find(d => d.id === id);
                
                let html = `
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] font-black opacity-30 uppercase mb-1">Operador</p>
                            <p class="text-xs font-black text-orange-400 uppercase truncate">${data.usuarioNombre || 'No disp.'}</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] font-black opacity-30 uppercase mb-1">Duración</p>
                            <p class="text-xs font-black uppercase">${data.duracion || '--:--'}</p>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <p class="text-[9px] font-black opacity-30 uppercase tracking-[0.2em] px-1">Cuerpo del Reporte</p>
                `;

                if (data.respuestas) {
                    Object.entries(data.respuestas).forEach(([pregunta, respuesta]) => {
                        html += `
                            <div class="bg-white/[0.02] p-5 rounded-2xl border border-white/5">
                                <p class="text-[9px] text-orange-400/80 font-black uppercase mb-2 leading-tight">${pregunta}</p>
                                <p class="text-[13px] text-white/70 font-medium leading-relaxed">${respuesta}</p>
                            </div>
                        `;
                    });
                }

                html += `</div>`;
                content.innerHTML = html;
            } catch (e) {
                content.innerHTML = `<p class="text-center text-red-400 font-black uppercase text-[10px]">Error de carga</p>`;
            }
        }

        function exportarCSV() {
            if (DATA_CACHE.length === 0) return;
            let csv = "ID,Operador,Modulo,Fecha,Hora\n";
            DATA_CACHE.forEach(r => {
                const f = r.fecha ? r.fecha.toDate() : new Date();
                csv += `${r.id},${r.usuarioNombre},${r.tituloEncuesta},${f.toLocaleDateString()},${f.toLocaleTimeString()}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `SmartFuh_Export_${Date.now()}.csv`);
            a.click();
        }

        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

        // Iniciador
        cargarReportes();

        // Feedback háptico visual
        if ('vibrate' in navigator) {
            document.addEventListener('click', (e) => {
                if (e.target.closest('.report-card, button, a')) navigator.vibrate(5);
            });
        }
    </script>
</body>
</html>
