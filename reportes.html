<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmartFuh | Pet Analytics Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #1a0f0e; --accent: #e89c2c; }
        body { 
            margin: 0; background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; padding-bottom: 100px; 
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }
        
        #bg-image {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background-image: url('fondo de login.jpeg'); 
            background-size: cover; background-position: center;
            filter: brightness(0.2) contrast(1.1); z-index: -1;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 28px; transition: 0.3s;
        }

        .report-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .report-card:active { transform: scale(0.96); background: rgba(255,255,255,0.08); }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .skeleton { 
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); 
            background-size: 200% 100%; animation: loading 1.5s infinite; 
        }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        #detail-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 10000; display: none; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(15px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::placeholder { color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <header class="p-8 pt-16 flex items-center justify-between sticky top-0 z-50 bg-gradient-to-b from-[#1a0f0e] via-[#1a0f0e]/80 to-transparent">
        <div class="flex items-center gap-4">
            <a href="inicio.html" class="w-12 h-12 glass flex items-center justify-center text-white active:scale-90 transition-transform">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">Pet Analytics</h1>
                <p id="live-status" class="text-[9px] font-black text-orange-400 tracking-[0.2em] uppercase flex items-center gap-2 mt-1">
                    <span class="w-1.5 h-1.5 bg-orange-400 rounded-full animate-pulse"></span>
                    Sincronizando
                </p>
            </div>
        </div>
        <button onclick="cargarReportesAdopcion()" class="w-12 h-12 glass flex items-center justify-center text-orange-400 active:rotate-180 transition-transform duration-500">
            <i class="fa-solid fa-arrows-rotate"></i>
        </button>
    </header>

    <main class="px-6 space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 border-b-4 border-orange-400/50">
                <p class="text-[8px] font-black opacity-40 uppercase mb-2">Mascotas Adoptadas</p>
                <h3 id="total-adopciones" class="text-4xl font-black italic tracking-tighter">--</h3>
            </div>
            <div class="glass p-6 border-b-4 border-emerald-400/50">
                <p class="text-[8px] font-black opacity-40 uppercase mb-2">Razas Únicas</p>
                <h3 id="total-razas" class="text-4xl font-black italic tracking-tighter">--</h3>
            </div>
        </div>

        <section class="space-y-3">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-orange-400/30"></i>
                <input type="text" id="buscador" oninput="filtrarReportes()" 
                    placeholder="BUSCAR RAZA O ADOPTANTE..." 
                    class="w-full glass bg-white/5 py-5 pl-14 pr-6 text-[10px] font-black uppercase tracking-widest outline-none focus:border-orange-400/50 transition-all">
            </div>
            <div class="flex gap-2">
                <button onclick="exportarCSV()" class="flex-1 glass py-4 flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i class="fa-solid fa-paw text-orange-400"></i>
                    <span class="text-[9px] font-black uppercase">Reporte de Adopciones</span>
                </button>
            </div>
        </section>

        <section class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h3 class="text-[10px] font-black opacity-40 uppercase tracking-[0.3em]">Registro Histórico</h3>
                <span class="text-[9px] font-bold opacity-20" id="counter-label">Mascotas: 0</span>
            </div>
            
            <div id="lista-respuestas" class="space-y-3">
                <div class="skeleton h-24 rounded-[28px]"></div>
                <div class="skeleton h-24 rounded-[28px]"></div>
            </div>
        </section>
    </main>

    <div id="detail-modal" onclick="event.target == this && closeModal()">
        <div class="glass w-full max-w-md overflow-hidden flex flex-col max-h-[85vh] shadow-2xl border-white/10">
            <div class="p-8 border-b border-white/5 flex justify-between items-start">
                <div>
                    <span class="text-[9px] font-black text-orange-400 uppercase tracking-[0.2em]">Ficha de Adopción</span>
                    <h2 id="modal-pet-name" class="font-black italic text-3xl uppercase tracking-tighter leading-none mt-1">Mascota</h2>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div id="modal-content" class="p-8 overflow-y-auto space-y-6 no-scrollbar bg-black/20 text-sm">
                </div>

            <div class="p-8 pt-4">
                <button onclick="closeModal()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em]">
                    Cerrar Registro
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867",
            measurementId: "G-07XSZSSCQ5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let ADOPCIONES_CACHE = [];

        async function cargarReportesAdopcion() {
            const container = document.getElementById('lista-respuestas');
            const liveStatus = document.getElementById('live-status');
            liveStatus.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>Actualizando registros...`;
            
            try {
                // Obtenemos los datos de la colección 'adopciones'
                const snap = await db.collection('adopciones').orderBy('fecha', 'desc').get();
                
                ADOPCIONES_CACHE = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Calculamos razas únicas
                const razasUnicas = new Set(ADOPCIONES_CACHE.map(a => (a.raza || 'Desconocida').toLowerCase()));
                
                document.getElementById('total-adopciones').innerText = ADOPCIONES_CACHE.length;
                document.getElementById('total-razas').innerText = razasUnicas.size;

                renderizarAdopciones(ADOPCIONES_CACHE);

                liveStatus.innerHTML = `<span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Base de Datos Actualizada`;
            } catch (e) {
                console.error(e);
                liveStatus.innerHTML = `<span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> Error de Conexión`;
            }
        }

        function renderizarAdopciones(lista) {
            const container = document.getElementById('lista-respuestas');
            document.getElementById('counter-label').innerText = `Mascotas: ${lista.length}`;
            container.innerHTML = '';

            if (lista.length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-20"><p class="text-[10px] font-black uppercase">No hay adopciones registradas</p></div>`;
                return;
            }

            lista.forEach((ad, index) => {
                const fecha = ad.fecha ? ad.fecha.toDate().toLocaleDateString('es-MX') : '---';
                
                container.innerHTML += `
                    <div class="glass p-5 flex items-center justify-between report-card fade-in border-l-4 border-orange-400/20 hover:border-orange-400" 
                         style="animation-delay: ${index * 0.03}s" 
                         onclick="verDetalle('${ad.id}')">
                        <div class="flex gap-4 items-center overflow-hidden">
                            <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center shrink-0">
                                <i class="fa-solid ${ad.especie === 'Gato' ? 'fa-cat' : 'fa-dog'} text-orange-400 text-lg"></i>
                            </div>
                            <div class="truncate">
                                <h4 class="font-black text-[13px] uppercase tracking-tight text-white truncate">${ad.nombreMascota || 'Sin nombre'}</h4>
                                <p class="text-[9px] text-orange-400/80 font-black uppercase">${ad.raza || 'Raza no especificada'}</p>
                                <p class="text-[8px] opacity-40 font-bold uppercase truncate">Adoptante: ${ad.usuarioNombre || 'Anónimo'}</p>
                            </div>
                        </div>
                        <div class="text-right shrink-0 ml-4">
                            <p class="text-[10px] font-black text-white">${fecha}</p>
                            <span class="text-[7px] bg-orange-400/10 text-orange-400 px-2 py-1 rounded-full font-black uppercase">Elite Pet</span>
                        </div>
                    </div>
                `;
            });
        }

        function filtrarReportes() {
            const query = document.getElementById('buscador').value.toLowerCase();
            const filtrados = ADOPCIONES_CACHE.filter(a => 
                (a.nombreMascota || '').toLowerCase().includes(query) || 
                (a.raza || '').toLowerCase().includes(query) ||
                (a.usuarioNombre || '').toLowerCase().includes(query)
            );
            renderizarAdopciones(filtrados);
        }

        function verDetalle(id) {
            const ad = ADOPCIONES_CACHE.find(item => item.id === id);
            if(!ad) return;

            document.getElementById('modal-pet-name').innerText = ad.nombreMascota || 'Mascota';
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[8px] opacity-30 uppercase font-black">Especie</p>
                        <p class="font-black text-orange-400 uppercase">${ad.especie || 'Animal'}</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[8px] opacity-30 uppercase font-black">Raza</p>
                        <p class="font-black text-white uppercase">${ad.raza || 'N/A'}</p>
                    </div>
                </div>
                <div class="bg-white/5 p-5 rounded-2xl">
                    <p class="text-[8px] opacity-30 uppercase font-black mb-2">Información del Adoptante</p>
                    <p class="font-black text-white text-xs">${ad.usuarioNombre || 'Anónimo'}</p>
                    <p class="text-[10px] opacity-50 mt-1">${ad.usuarioEmail || ''}</p>
                </div>
                <div class="bg-orange-400/5 p-5 rounded-2xl border border-orange-400/10">
                    <p class="text-[8px] text-orange-400 opacity-60 uppercase font-black mb-1">Motivo / Notas</p>
                    <p class="text-white/80 italic leading-relaxed">"${ad.notas || 'Sin observaciones adicionales en el registro.'}"</p>
                </div>
            `;
            
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function exportarCSV() {
            if (ADOPCIONES_CACHE.length === 0) return;
            let csv = "\uFEFFMascota,Especie,Raza,Adoptante,Fecha\n";
            ADOPCIONES_CACHE.forEach(ad => {
                const f = ad.fecha ? ad.fecha.toDate().toLocaleDateString() : '';
                csv += `"${ad.nombreMascota}","${ad.especie}","${ad.raza}","${ad.usuarioNombre}","${f}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SmartFuh_Adopciones_${Date.now()}.csv`;
            a.click();
        }

        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

        // Inicialización
        cargarReportesAdopcion();

        // Vibrate on click para mobile
        document.addEventListener('click', (e) => {
            if (e.target.closest('.report-card, button, a') && 'vibrate' in navigator) {
                navigator.vibrate(8);
            }
        });
    </script>
</body>
</html>
