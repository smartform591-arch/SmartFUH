<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmartFuh | Explorar Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand: #1a0f0e; --accent: #e89c2c; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; overflow: hidden;
        }
        
             #bg-image {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background-image: url('fondo de inicio.jpeg'); /* Tu imagen */
    background-size: cover;
    background-position: center;
    filter: brightness(0.4) contrast(1.1); /* Oscurece un poco la imagen para que el texto sea legible */
    z-index: -1;
}
        
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px; 
        }

        .dev-card {
            border: 1px dashed rgba(232, 156, 44, 0.2);
            position: relative; overflow: hidden;
        }

        .dev-card::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(232, 156, 44, 0.03), transparent);
            animation: scan 4s infinite linear;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        .btn-back {
            background: rgba(232, 156, 44, 0.1);
            border: 1px solid rgba(232, 156, 44, 0.4);
            color: var(--accent);
            padding: 18px 40px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-back:active {
            transform: scale(0.95);
            background: var(--accent);
            color: var(--brand);
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <main class="h-screen w-full flex flex-col items-center justify-center p-6 text-center">
        
        <header class="mb-8">
            <div class="flex justify-center mb-4">
                <span class="bg-orange-400 text-black text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Módulo Elite</span>
            </div>
            <h1 class="text-4xl font-black tracking-tighter italic uppercase leading-none">Explorar</h1>
        </header>

        <div class="glass dev-card p-10 w-full max-w-sm flex flex-col items-center shadow-2xl">
            <div class="w-24 h-24 bg-orange-400/10 rounded-[35px] flex items-center justify-center text-orange-400 mb-8 border border-orange-400/20 shadow-inner">
                <i class="fa-solid fa-microchip text-4xl animate-pulse"></i>
            </div>
            
            <h2 class="text-xl font-black uppercase tracking-tight leading-tight">Buscador<br><span class="text-orange-400">EN DESARROLLO</span></h2>
            
            <p class="text-[11px] opacity-40 font-medium mt-6 leading-relaxed px-4">
                Esta seccion esta en desarrolo aun para la busqueda y mejora del sistema.
            </p>

            <div class="w-full bg-white/5 h-[3px] mt-10 rounded-full relative overflow-hidden">
                <div class="absolute inset-0 bg-orange-400 w-1/4 rounded-full animate-[loading_3s_infinite_ease-in-out]"></div>
            </div>
            <p class="text-[7px] font-black uppercase opacity-20 mt-4 tracking-[0.3em]">Actualizando buscador del sistema...</p>
        </div>

        <div class="mt-12">
            <a href="inicio.html" class="btn-back flex items-center gap-3">
                <i class="fa-solid fa-arrow-left-long"></i>
                Volver al Panel
            </a>
        </div>

        <footer class="absolute bottom-10">
            <p class="text-[8px] font-bold opacity-10 uppercase tracking-[0.5em]">SmartFuh Engineering Systems</p>
        </footer>

    </main>

</body>
</html>
