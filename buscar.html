<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Smart Pet | Matchmaking Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --brand: #0f0a09; 
            --accent: #e89c2c; 
            --accent-glow: rgba(232, 156, 44, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background: var(--brand); 
            color: #f0f0f0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            letter-spacing: -0.01em;
        }
        
        #bg-image {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background-image: url('fondo de login.jpeg');
            background-size: cover; background-position: center;
            filter: brightness(0.15) contrast(1.1) saturate(0.8); 
            z-index: -1;
            transform: scale(1.05);
        }

        .glass-morfism {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border-radius: 32px;
        }

        .input-field {
            width: 100%; 
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 20px; 
            padding: 16px 20px; 
            color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 14px;
        }
        
        .input-field:focus { 
            border-color: var(--accent); 
            background: rgba(232, 156, 44, 0.03); 
            box-shadow: 0 0 15px var(--accent-glow);
            outline: none; 
            transform: translateY(-2px);
        }

        #progress-fill {
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, #e89c2c, #ffb347);
            box-shadow: 0 0 15px var(--accent);
            border-radius: 10px;
            transition: width 0.5s ease-in-out;
        }

        .steps-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 120px;
            scrollbar-width: none;
        }

        .steps-container::-webkit-scrollbar { display: none; }

        .step-card { 
            display: none; 
            animation: stepEnter 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; 
        }
        
        .step-card.active { display: block; }

        @keyframes stepEnter { 
            from { opacity: 0; transform: scale(0.98) translateY(15px); filter: blur(10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } 
        }

        .btn-nav { 
            padding: 18px; 
            border-radius: 24px; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 11px; 
            letter-spacing: 1.5px; 
            transition: all 0.3s ease;
        }

        .btn-next { background: var(--accent); color: #000; width: 100%; }
        .btn-next:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn-prev { background: rgba(255,255,255,0.03); color: white; border: 1px solid var(--glass-border); }

        .icon-box {
            width: 56px; height: 56px; 
            background: linear-gradient(135deg, rgba(232, 156, 44, 0.2), rgba(232, 156, 44, 0.05));
            border: 1px solid rgba(232, 156, 44, 0.3);
            border-radius: 20px; 
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); 
            margin-bottom: 20px;
        }

        #custom-toast {
            position: fixed; top: 30px; left: 50%; 
            transform: translateX(-50%) translateY(-150%);
            z-index: 10000; width: 90%; max-width: 380px;
            background: rgba(20, 15, 15, 0.9); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent); 
            border-radius: 24px;
            padding: 18px; 
            transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #custom-toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <div id="custom-toast" class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-full bg-orange-400/20 flex items-center justify-center text-orange-400">
            <i class="fa-solid fa-bolt"></i>
        </div>
        <p id="toast-message" class="text-[11px] font-black uppercase tracking-tight"></p>
    </div>

    <main id="loading-screen" class="h-screen w-full flex flex-col items-center justify-center p-8 text-center bg-[#0f0a09] z-[9999] relative">
        <div class="relative mb-10">
            <div class="w-24 h-24 border-4 border-white/5 border-t-orange-400 rounded-full animate-spin"></div>
            <i class="fa-solid fa-paw absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-orange-400 text-2xl"></i>
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter uppercase mb-2">SMARTFUH <span class="text-orange-400">2026</span></h1>
        <p class="text-[10px] opacity-50 uppercase tracking-[0.4em] mb-12">Protocolo Matchmaking Elite</p>
        
        <div class="w-full max-w-xs space-y-4">
            <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                <div id="load-progress" class="h-full bg-orange-400 w-0 transition-all"></div>
            </div>
            <div class="flex justify-between items-center text-[10px] font-bold uppercase text-orange-400">
                <span id="status-text">Iniciando</span>
                <span id="load-text">0%</span>
            </div>
        </div>
    </main>

    <main id="search-content" class="hidden h-screen w-full flex flex-col p-6">
        <header class="flex items-center justify-between mt-4 mb-8 shrink-0">
            <button onclick="handleBack()" class="w-12 h-12 glass-morfism flex items-center justify-center active:scale-90 transition-transform">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <div class="text-center">
                <h2 class="text-xs font-black text-orange-400 uppercase tracking-[0.3em]">Protocolo SIAMFUH</h2>
                <p id="step-count" class="text-[9px] opacity-40 uppercase font-bold mt-1">Selección</p>
            </div>
            <div class="w-12 h-12 bg-orange-400/10 rounded-2xl flex items-center justify-center border border-orange-400/20">
                <i class="fa-solid fa-dna text-orange-400"></i>
            </div>
        </header>

        <div class="steps-container">
            <div class="step-card active" id="step-0">
                <div class="icon-box"><i class="fa-solid fa-magnifying-glass-paw"></i></div>
                <h3 class="text-2xl font-black mb-2 uppercase italic tracking-tighter">¿A quién buscas?</h3>
                <p class="text-[10px] opacity-40 uppercase tracking-widest mb-6">Módulo de Vinculación Inteligente</p>
                
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="selectAnimal('Perro', 'Canino')" class="glass-morfism p-5 text-center border border-white/5 hover:border-orange-400/50 transition-all active:scale-95 group">
                        <i class="fa-solid fa-dog text-3xl mb-3 text-orange-400 group-hover:scale-110 transition-transform"></i>
                        <p class="text-[11px] font-black uppercase">Caninos</p>
                    </button>
                    <button type="button" onclick="selectAnimal('Gato', 'Felino')" class="glass-morfism p-5 text-center border border-white/5 hover:border-orange-400/50 transition-all active:scale-95 group">
                        <i class="fa-solid fa-cat text-3xl mb-3 text-orange-400 group-hover:scale-110 transition-transform"></i>
                        <p class="text-[11px] font-black uppercase">Felinos</p>
                    </button>
                    <button type="button" onclick="selectAnimal('Ave', 'Ave')" class="glass-morfism p-5 text-center border border-white/5 hover:border-orange-400/50 transition-all active:scale-95 group">
                        <i class="fa-solid fa-feather-pointed text-3xl mb-3 text-orange-400 group-hover:scale-110 transition-transform"></i>
                        <p class="text-[11px] font-black uppercase">Aves</p>
                    </button>
                    <button type="button" onclick="selectAnimal('Reptil', 'Reptil')" class="glass-morfism p-5 text-center border border-white/5 hover:border-orange-400/50 transition-all active:scale-95 group">
                        <i class="fa-solid fa-worm text-3xl mb-3 text-orange-400 group-hover:scale-110 transition-transform"></i>
                        <p class="text-[11px] font-black uppercase">Reptiles</p>
                    </button>
                    <button type="button" onclick="selectAnimal('Acuático', 'Acuático')" class="glass-morfism p-5 text-center border border-white/5 hover:border-orange-400/50 transition-all active:scale-95 group">
                        <i class="fa-solid fa-fish-fins text-3xl mb-3 text-orange-400 group-hover:scale-110 transition-transform"></i>
                        <p class="text-[11px] font-black uppercase">Acuáticos</p>
                    </button>
                    <button type="button" onclick="selectAnimal('Urgente', 'Rescate')" class="glass-morfism p-5 text-center border border-orange-400/30 bg-orange-400/5 transition-all active:scale-95 group">
                        <i class="fa-solid fa-kit-medical text-3xl mb-3 text-orange-400 animate-pulse"></i>
                        <p class="text-[11px] font-black uppercase text-orange-400">Urgentes</p>
                    </button>
                </div>
            </div>

            <div class="step-card" id="step-1">
                <div class="icon-box"><i class="fa-solid fa-heart"></i></div>
                <h3 class="text-xl font-black mb-6 uppercase italic">Tus Motivos</h3>
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block label-dynamic">1. ¿Por qué deseas adoptar?</label>
                        <textarea class="input-field h-24" placeholder="Cuéntanos tu razón..."></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">2. ¿Otros animales?</label>
                            <input type="text" class="input-field" placeholder="¿Cuáles?">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">3. ¿Animales anteriores?</label>
                            <input type="text" class="input-field" placeholder="¿Cuáles?">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">4. ¿Qué pasó con ellos?</label>
                        <input type="text" class="input-field" placeholder="Historia breve...">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">15. Conocimiento de longevidad</label>
                        <select class="input-field">
                            <option>Sé que viven muchos años</option>
                            <option>No estoy seguro</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="step-card" id="step-2">
                <div class="icon-box"><i class="fa-solid fa-users"></i></div>
                <h3 class="text-xl font-black mb-6 uppercase italic">Tu Entorno</h3>
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">7. Personas en casa</label>
                            <input type="number" class="input-field" placeholder="Cant.">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">9. ¿Hay niños?</label>
                            <input type="text" class="input-field" placeholder="Edades">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">8. ¿Todos de acuerdo?</label>
                            <select class="input-field"><option>Sí</option><option>No</option></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">14. ¿Alguien alérgico?</label>
                            <select class="input-field"><option>No</option><option>Sí</option></select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">10. Tipo de vivienda / Renta</label>
                        <select class="input-field"><option>Propia</option><option>Renta (con permiso)</option><option>Renta (sin permiso)</option></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">17. ¿Tienes espacio suficiente?</label>
                        <select class="input-field"><option>Sí, espacio amplio</option><option>Espacio reducido</option></select>
                    </div>
                </div>
            </div>

            <div class="step-card" id="step-3">
                <div class="icon-box"><i class="fa-solid fa-clock"></i></div>
                <h3 class="text-xl font-black mb-6 uppercase italic">Vida Diaria</h3>
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">12. En caso de crisis o mudanza</label>
                        <input type="text" class="input-field" placeholder="¿Qué pasará con el animal?">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label id="label-sleep" class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">18. Lugar para dormir</label>
                            <input type="text" class="input-field" placeholder="Ej: Adentro">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase opacity-50 ml-2 mb-2 block">19. Horas solo</label>
                            <input type="number" class="input-field" placeholder="Horas/día">
                        </div>
                    </div>
                    <div class="p-4 bg-orange-400/5 border border-orange-400/20 rounded-2xl">
                        <label class="text-[10px] font-bold uppercase opacity-50 mb-2 block">5. ¿Aceptas seguimiento SIAMFUH?</label>
                        <select class="input-field mb-3"><option>Sí, acepto visitas</option><option>No acepto</option></select>
                        <label class="text-[10px] font-bold uppercase opacity-50 mb-2 block">6. Justifica tu respuesta</label>
                        <input type="text" class="input-field" placeholder="¿Por qué?">
                    </div>
                </div>
            </div>
        </div>

        <footer class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-brand via-brand to-transparent shrink-0">
            <div class="max-w-md mx-auto flex gap-4">
                <button id="prevBtn" onclick="changeStep(-1)" class="btn-nav btn-prev hidden w-20"><i class="fa-solid fa-arrow-left"></i></button>
                <button id="nextBtn" onclick="changeStep(1)" class="btn-nav btn-next hidden">Siguiente</button>
            </div>
        </footer>
    </main>

    <script>
        let currentStep = 0;
        const totalSteps = 3;
        let selectedAnimalId = "";

        // NOTIFICACIONES
        function showSystemMsg(text) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-message').innerText = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // CARGA
        window.addEventListener('load', () => {
            let progress = 0;
            const statusSteps = ["Cargando Protocolos", "Vinculando SmartForm", "Consultando SIAMFUH", "Optimizando"];
            const interval = setInterval(() => {
                progress += 2;
                document.getElementById('load-progress').style.width = progress + '%';
                document.getElementById('load-text').innerText = progress + '%';
                document.getElementById('status-text').innerText = statusSteps[Math.floor(progress/26)] || "Listo";
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loading-screen').classList.add('hidden');
                        document.getElementById('search-content').classList.remove('hidden');
                    }, 500);
                }
            }, 30);
        });

        // SELECCIÓN DE ANIMAL
        function selectAnimal(id, label) {
            selectedAnimalId = id;
            const config = {
                'Acuático': { sujeto: 'el ejemplar', lugar: 'pecera' },
                'Reptil': { sujeto: 'el reptil', lugar: 'terrario' },
                'Ave': { sujeto: 'el ave', lugar: 'jaula/aviario' },
                'Perro': { sujeto: 'el perro', lugar: 'cama' },
                'Gato': { sujeto: 'el gato', lugar: 'arenero' },
                'Urgente': { sujeto: 'el rescatado', lugar: 'zona segura' }
            }[id] || { sujeto: 'el adoptado', lugar: 'su lugar' };

            document.getElementById('label-sleep').innerText = `18. ¿Dónde dormirá ${config.sujeto}? (Ej: ${config.lugar})`;
            document.querySelector('.label-dynamic').innerText = `1. ¿Por qué deseas adoptar un ${label}?`;
            
            showSystemMsg(`Protocolo ${label} vinculado con SmartForm`);
            changeStep(1);
        }

        // NAVEGACIÓN
        function changeStep(n) {
            if (currentStep + n > totalSteps) {
                showSystemMsg("Generando Perfil de Adoptante...");
                setTimeout(() => {
                    showSystemMsg("Sincronizando con SIAMFUH...");
                    setTimeout(() => location.href = 'inicio.html', 1500);
                }, 1000);
                return;
            }

            document.getElementById(`step-${currentStep}`).classList.remove('active');
            currentStep += n;
            document.getElementById(`step-${currentStep}`).classList.add('active');

            // UI Updates
            document.getElementById('step-count').innerText = currentStep === 0 ? "Selección" : `Paso ${currentStep} de 3`;
            document.getElementById('prevBtn').classList.toggle('hidden', currentStep === 0);
            
            const nextBtn = document.getElementById('nextBtn');
            if (currentStep === 0) {
                nextBtn.classList.add('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                nextBtn.innerText = currentStep === totalSteps ? "Finalizar" : "Siguiente";
            }
            
            document.querySelector('.steps-container').scrollTop = 0;
        }

        function handleBack() {
            if (currentStep === 0) {
                location.href = 'inicio.html';
            } else {
                changeStep(-1);
            }
        }
    </script>
</body>
</html>
