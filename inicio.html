<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartFuh">
    <link rel="apple-touch-icon" href="123.png">
    <meta name="theme-color" content="#4a2c2a">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmartFuh | Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand: #4a2c2a; --accent: #e89c2c; }
        body { 
            margin: 0; background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; padding-bottom: 120px; 
            overflow-x: hidden; user-select: none;
        }
        #bg-image {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background-image: url('fondo de inicio.jpeg'); /* Tu imagen */
    background-size: cover;
    background-position: center;
    filter: brightness(0.4) contrast(1.1); /* Oscurece un poco la imagen para que el texto sea legible */
    z-index: -1;
}

        
        .glass { 
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 32px; 
        }

        .fade-in { animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 80px;
            background: rgba(40, 20, 18, 0.8); backdrop-filter: blur(30px);
            border-radius: 40px; display: flex; justify-content: space-around; 
            align-items: center; z-index: 1000; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: rgba(255,255,255,0.3); text-decoration: none; transition: 0.4s;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
        
        .nav-center-wrapper { position: relative; top: -25px; }
        .nav-center {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--accent), #ffcc80);
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; color: #3a1f1d;
            box-shadow: 0 15px 30px rgba(232, 156, 44, 0.3);
            transform: rotate(45deg); border: 4px solid var(--brand);
        }
        .nav-center i { transform: rotate(-45deg); font-size: 1.5rem; }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <div id="update-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(10px);">
        <div class="glass" style="background: #2d1b1a; border: 1px solid #e89c2c; width: 100%; max-width: 320px; padding: 30px; text-align: center;">
            <div style="width: 60px; height: 60px; background: rgba(232,156,44,0.2); color: #e89c2c; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fa-solid fa-bolt-lightning text-2xl"></i>
            </div>
            <h2 style="font-weight: 900; font-style: italic; font-size: 20px; margin-bottom: 5px; color: white;">NUEVA VERSIÓN</h2>
            <p id="v-tag" style="color: #e89c2c; font-size: 10px; font-weight: 900; letter-spacing: 2px; margin-bottom: 20px;">VERSIÓN 1.0.0</p>
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 25px;">
                <p id="v-msg" style="font-size: 12px; opacity: 0.8; line-height: 1.5; color: white;"></p>
            </div>
            <button onclick="closeUpdate()" style="width: 100%; padding: 15px; background: #e89c2c; color: #4a2c2a; border-radius: 15px; font-weight: 900; font-size: 10px; text-transform: uppercase; border: none;">Actualizar Ahora</button>
        </div>
    </div>

    <header class="p-8 pt-20 flex justify-between items-start fade-in">
        <div>
            <div class="flex items-center gap-2 mb-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-[10px] font-black text-white/40 tracking-[0.4em] uppercase">Cloud Sincronizado</p>
            </div>
            <h1 class="text-4xl font-black italic tracking-tighter leading-none">HOLA, <br><span id="userName" class="text-orange-400">...</span></h1>
        </div>
        <button onclick="window.location.href='perfil.html'" class="relative active:scale-90 transition-transform">
            <div class="w-16 h-16 glass p-1 border-white/10 overflow-hidden">
                <img src="1234.png" class="w-full h-full object-cover rounded-[24px]">
            </div>
        </button>
    </header>

    <main class="px-6 space-y-6">
        <section class="glass p-7 flex justify-between items-center shadow-2xl fade-in relative overflow-hidden" style="animation-delay: 0.2s;">
            <div class="relative z-10 space-y-1">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-location-dot text-orange-400 text-[10px]"></i>
                    <span class="text-[10px] font-black uppercase opacity-60 tracking-widest" id="locationLabel">Cargando...</span>
                </div>
                <h2 class="text-6xl font-black tracking-tighter" id="tempDisplay">--°</h2>
                <p class="text-[9px] font-bold opacity-40 uppercase">Sensación Térmica: <span id="lastUpdate">--</span></p>
            </div>
            <div class="text-right z-10">
                <i class="fa-solid fa-cloud-sun text-4xl text-orange-400"></i>
                <p id="weatherDesc" class="text-[10px] font-black uppercase text-white mt-2">Despejado</p>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4 fade-in" style="animation-delay: 0.3s;">
            <div class="glass p-5 border-t border-white/10">
                <p class="text-[9px] font-black opacity-40 uppercase mb-2 tracking-widest">Base de Datos</p>
                <div class="flex items-baseline gap-1">
                    <h4 class="text-3xl font-black italic" id="stat-count">0</h4>
                    <span class="text-[8px] text-orange-400 font-bold uppercase">Docs</span>
                </div>
            </div>
            <div class="glass p-5 border-t border-white/10">
                <p class="text-[9px] font-black opacity-40 uppercase mb-2 tracking-widest">Seguridad</p>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                    <h4 class="text-[10px] font-black text-green-400 uppercase tracking-widest">SSL Activo</h4>
                </div>
            </div>
        </div>

        <div class="fade-in pb-10" style="animation-delay: 0.4s;">
            <div class="flex justify-between items-center mb-5 px-2">
                <h3 class="text-[11px] font-black opacity-40 uppercase tracking-[0.2em]">Últimas Encuestas</h3>
                <i class="fa-solid fa-bolt text-orange-400 text-xs"></i>
            </div>
            
            <div id="listaEncuestas" class="space-y-4">
                <div class="glass p-6 shimmer opacity-50"></div>
                <div class="glass p-6 shimmer opacity-30"></div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav" id="mainNav"></nav>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Clima
        async function updateWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                    const data = await res.json();
                    document.getElementById('tempDisplay').innerText = `${Math.round(data.current_weather.temperature)}°`;
                    document.getElementById('lastUpdate').innerText = "Estable";
                } catch(e) { console.log("Weather Error"); }
            }, () => {
                document.getElementById('locationLabel').innerText = "GPS Desactivado";
            });
        }

        // Navegación Dinámica
        function buildNav(rol) {
            const nav = document.getElementById('mainNav');
            const isAdmin = (rol === 'administrador');
            nav.innerHTML = `
                <a href="inicio.html" class="nav-item active">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </a>
                <a href="${isAdmin ? 'reportes.html' : 'responder.html'}" class="nav-item">
                    <i class="fa-solid ${isAdmin ? 'fa-chart-pie' : 'fa-clipboard-list'}"></i>
                    <span>${isAdmin ? 'Reportes' : 'Lista'}</span>
                </a>
                <a href="${isAdmin ? 'creador.html' : 'buscar.html'}" class="nav-center-wrapper">
                    <div class="nav-center"><i class="fa-solid ${isAdmin ? 'fa-plus' : 'fa-qrcode'}"></i></div>
                </a>
                <a href="perfil.html" class="nav-item">
                    <i class="fa-solid fa-user-ninja"></i>
                    <span>Perfil</span>
                </a>
                <a href="ajustes.html" class="nav-item">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Ajustes</span>
                </a>
            `;
        }

        // Variable global para la versión detectada
window.pendingVersion = "";

// Función mejorada para detectar actualizaciones
async function checkUpdates() {
    // Usamos onSnapshot para que detecte la actualización AL INSTANTE sin recargar
    db.collection('system').doc('version_control').onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();
            const lastSeen = localStorage.getItem('last_version_seen') || "1.0.0";

            if (data.currentVersion !== lastSeen) {
                window.pendingVersion = data.currentVersion;
                document.getElementById('v-tag').innerText = `VERSIÓN ${data.currentVersion}`;
                document.getElementById('v-msg').innerText = data.releaseNotes || "Mejoras de rendimiento y estabilidad.";
                document.getElementById('update-modal').style.display = 'flex';
            }
        }
    });
}

// Función que simula la instalación
async function startInstallation() {
    // 1. Cerramos el modal de aviso
    document.getElementById('update-modal').style.display = 'none';
    
    // 2. Mostramos la pantalla negra de instalación
    const installScreen = document.getElementById('installing-screen');
    const progressText = document.getElementById('install-progress');
    installScreen.style.display = 'flex';

    // 3. Simulamos pasos técnicos
    setTimeout(() => { progressText.innerText = "Verificando archivos core..."; }, 1200);
    setTimeout(() => { progressText.innerText = "Reescribiendo registros en caché..."; }, 2500);
    setTimeout(() => { progressText.innerText = "Optimizando base de datos..."; }, 3800);

    // 4. Finalizamos, guardamos la versión y recargamos
    setTimeout(() => {
        localStorage.setItem('last_version_seen', window.pendingVersion);
        location.reload();
    }, 5000);
}

// Cambiamos el comportamiento del botón del modal
function closeUpdate() {
    startInstallation(); // En lugar de solo cerrar, inicia la instalación
}

        // Cargar Datos
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = await db.collection('usuarios').doc(user.uid).get();
                if(userDoc.exists) {
                    const userData = userDoc.data();
                    document.getElementById('userName').innerText = userData.nombre.split(' ')[0].toUpperCase();
                    document.getElementById('locationLabel').innerText = userData.ciudad || "ZONA ACTIVA";
                    buildNav(userData.rol);
                    loadSurveys();
                    updateWeather();
                    checkUpdates();
                }
            } else { window.location.href = 'index.html'; }
        });

        async function loadSurveys() {
            const snap = await db.collection('encuestas').limit(5).get();
            document.getElementById('stat-count').innerText = snap.size;
            let html = '';
            snap.forEach(doc => {
                const d = doc.data();
                html += `
                <div class="glass p-5 flex items-center gap-4 active:scale-95 transition-all" onclick="window.location.href='responder.html?id=${doc.id}'">
                    <div class="w-12 h-12 rounded-xl bg-orange-400/10 flex items-center justify-center text-orange-400">
                        <i class="fa-solid fa-file-signature"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="text-[12px] font-black uppercase tracking-tight">${d.titulo || 'Sin Título'}</h4>
                        <p class="text-[9px] opacity-40 font-bold uppercase tracking-tighter">ID: ${doc.id.substring(0,8)}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-[10px] opacity-20"></i>
                </div>`;
            });
            document.getElementById('listaEncuestas').innerHTML = html || '<p class="text-center opacity-20 py-10 text-xs">Sin encuestas</p>';
        }
    </script>
    <div id="installing-screen" style="position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 110000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px);">
    <div style="position: relative;">
        <div style="width: 80px; height: 80px; border: 4px solid rgba(232,156,44,0.1); border-top: 4px solid #e89c2c; border-radius: 50%; animate: spin 1s linear infinite;" class="animate-spin"></div>
        <i class="fa-solid fa-cloud-arrow-down" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #e89c2c; font-size: 20px;"></i>
    </div>
    <h2 style="color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; margin-top: 30px; font-size: 14px;">Instalando Mejoras</h2>
    <p id="install-progress" style="color: #e89c2c; opacity: 0.6; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 10px; letter-spacing: 1px;">Sincronizando paquetes...</p>
</div>
</body>
</html>
