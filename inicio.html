<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>SmartFuh | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #4a2c2a; --accent: #e89c2c; }
        body { 
            margin: 0; background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; padding-bottom: 120px; 
            overflow-x: hidden;
        }
        #videoBG { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.25; z-index: -1; filter: saturate(1.2); }
        
        .glass { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12); 
            border-radius: 28px; 
        }

        /* Animación de entrada para las tarjetas */
        .fade-in { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bottom Nav Premium Re-diseñada */
.bottom-nav {
    position: fixed; 
    bottom: 25px; 
    left: 50%; 
    transform: translateX(-50%);
    width: 92%; 
    max-width: 420px; 
    height: 75px;
    background: rgba(255, 255, 255, 0.1); /* Fondo translúcido */
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-radius: 30px; 
    display: flex; 
    justify-content: space-around; 
    align-items: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.2); 
    z-index: 1000; 
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0 15px;
}

/* Items de navegación */
.nav-item {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    width: 50px;
    height: 50px;
    border-radius: 18px;
}

/* Efecto Activo */
.nav-item.active {
    color: var(--accent);
    background: rgba(232, 156, 44, 0.1);
}

.nav-item.active::after {
    content: "";
    position: absolute;
    bottom: -8px;
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
}

/* Botón Central de Acción */
.nav-center-btn {
    position: relative;
    top: -25px; /* Elevación */
    width: 65px;
    height: 65px;
    background: linear-gradient(135deg, var(--accent), #f3b04d);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--brand);
    font-size: 1.5rem;
    box-shadow: 0 15px 25px rgba(232, 156, 44, 0.4);
    transform: rotate(45deg); /* Estilo diamante */
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 4px solid var(--brand);
}

.nav-center-btn i {
    transform: rotate(-45deg); /* Enderezar icono */
}

.nav-center-btn:active {
    transform: rotate(45deg) scale(0.9);
    box-shadow: 0 5px 10px rgba(232, 156, 44, 0.2);
}

/* Adaptación Modo Claro (Si lo usas) */
body.light-mode .bottom-nav {
    background: rgba(255, 255, 255, 0.8);
    border: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

body.light-mode .nav-item { color: #64748b; }
body.light-mode .nav-center-btn { border-color: #f8fafc; }
        .nav-item { color: #8a99af; display: flex; flex-direction: column; align-items: center; transition: 0.3s; text-decoration: none; }
        .nav-item.active { color: var(--brand); transform: translateY(-5px); }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 9px; font-weight: 800; margin-top: 4px; text-transform: uppercase; }

        .nav-center-wrapper { position: relative; top: -32px; }
        .nav-center {
            width: 64px; height: 64px; background: var(--brand);
            transform: rotate(45deg); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 3.5px solid var(--accent);
            transition: 0.3s;
        }
        .nav-center i { transform: rotate(-45deg); color: var(--accent); font-size: 26px; }
        .nav-center:active { transform: rotate(45deg) scale(0.9); }
    </style>
    <style>
    /* Contenedor de la barra */
    .bottom-nav {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 95%; max-width: 450px; height: 70px;
        background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
        border-radius: 25px; display: flex; justify-content: space-around; 
        align-items: center; z-index: 1000; border: 1px solid rgba(255,255,255,0.1);
        padding: 0 10px;
    }

    /* Items normales */
    .nav-item {
        display: flex; flex-direction: column; align-items: center;
        color: rgba(255,255,255,0.5); text-decoration: none; font-size: 10px;
        transition: 0.3s; width: 60px;
    }
    .nav-item i { font-size: 1.2rem; margin-bottom: 4px; }
    .nav-item.active { color: var(--accent); }

    /* Botón Central Diamante */
    .nav-center-wrapper {
        position: relative; top: -20px; text-decoration: none;
    }
    .nav-center {
        width: 55px; height: 55px;
        background: linear-gradient(135deg, var(--accent), #f3b04d);
        border-radius: 18px; display: flex; align-items: center;
        justify-content: center; color: var(--brand);
        box-shadow: 0 10px 20px rgba(232, 156, 44, 0.3);
        transform: rotate(45deg); border: 3px solid var(--brand);
        transition: 0.3s;
    }
    .nav-center i { transform: rotate(-45deg); font-size: 1.4rem; }
    .nav-center:active { transform: rotate(45deg) scale(0.9); }
</style>
</head>
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SmartFuh">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="theme-color" content="#4a2c2a">

<script>
  // Registrar el Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado', reg))
        .catch(err => console.log('Error al registrar SW', err));
    });
  }
</script>
<body>

    <video autoplay muted loop playsinline id="videoBG">
        <source src="12345.mp4" type="video/mp4">
    </video>

    <header class="p-8 pt-16 flex justify-between items-center fade-in" style="animation-delay: 0.1s;">
        <div>
            <p class="text-[10px] font-bold text-orange-400 tracking-[0.3em] uppercase opacity-80 mb-1">Panel de Control</p>
            <h1 class="text-4xl font-black italic tracking-tighter leading-none">HOLA, <br><span id="userName" class="text-white">...</span></h1>
        </div>
        <div class="relative">
            <img src="1234.png" class="w-16 h-16 glass p-2 border-white/20 shadow-2xl">
            <span class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-4 border-[#4a2c2a] rounded-full"></span>
        </div>
    </header>

    <main class="px-6 space-y-6">
        
        <section class="glass p-6 flex justify-between items-center shadow-xl fade-in" style="animation-delay: 0.2s;">
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-location-dot text-orange-400 text-xs"></i>
                    <span class="text-[10px] font-bold uppercase opacity-60">México</span>
                </div>
                <h2 class="text-5xl font-black" id="tempDisplay">24°C</h2>
                <p class="text-[10px] font-medium opacity-50">Cielos despejados hoy</p>
            </div>
            <div class="text-right">
                <i class="fa-solid fa-cloud-sun text-5xl text-orange-400 drop-shadow-lg"></i>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4 fade-in" style="animation-delay: 0.3s;">
            <div class="glass p-4 border-l-4 border-orange-400">
                <p class="text-[9px] font-bold opacity-50 uppercase mb-1">Encuestas</p>
                <h4 class="text-xl font-black" id="stat-count">--</h4>
            </div>
            <div class="glass p-4 border-l-4 border-green-400">
                <p class="text-[9px] font-bold opacity-50 uppercase mb-1">Estado</p>
                <h4 class="text-xl font-black text-green-400">Activo</h4>
            </div>
        </div>

        <div class="fade-in" style="animation-delay: 0.4s;">
            <div class="flex justify-between items-end mb-4 px-2">
                <h3 class="text-xs font-black opacity-50 uppercase tracking-widest">Encuestas Disponibles</h3>
                <span class="text-[9px] font-bold text-orange-400">Ver todas</span>
            </div>
            
            <div id="listaEncuestas" class="space-y-3">
                <div class="p-10 text-center opacity-20">
                    <i class="fa-solid fa-circle-notch animate-spin text-2xl"></i>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav" id="mainNav"></nav>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = await db.collection('usuarios').doc(user.uid).get();
                if(userDoc.exists) {
                    const userData = userDoc.data();
                    document.getElementById('userName').innerText = userData.nombre.split(' ')[0].toUpperCase();
                    
                    buildNav(userData.rol);
                    loadSurveys();
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        function buildNav(rol) {
            const nav = document.getElementById('mainNav');
            const isAdmin = (rol === 'administrador');
            
            // Lógica de iconos y enlaces según el rol
            nav.innerHTML = `
                <a href="inicio.html" class="nav-item active">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </a>
                <a href="${isAdmin ? 'reportes.html' : 'responder.html'}" class="nav-item">
                    <i class="fa-solid ${isAdmin ? 'fa-chart-pie' : 'fa-clipboard-list'}"></i>
                    <span>${isAdmin ? 'Reportes' : 'Tareas'}</span>
                </a>
                
                <a href="${isAdmin ? 'creador.html' : 'buscar.html'}" class="nav-center-wrapper">
                    <div class="nav-center">
                        <i class="fa-solid ${isAdmin ? 'fa-plus' : 'fa-magnifying-glass'}"></i>
                    </div>
                </a>
                
                <a href="perfil.html" class="nav-item">
                    <i class="fa-solid fa-user-circle"></i>
                    <span>Perfil</span>
                </a>
                <a href="ajustes.html" class="nav-item">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Ajustes</span>
                </a>
            `;
        }

        async function loadSurveys() {
            try {
                const snap = await db.collection('encuestas').limit(5).get();
                document.getElementById('stat-count').innerText = snap.size;
                
                let html = '';
                if(snap.empty) {
                    html = '<p class="text-center py-10 opacity-30 text-xs">No hay encuestas pendientes</p>';
                } else {
                    snap.forEach(doc => {
                        const data = doc.data();
                        html += `
                        <div class="glass p-5 flex items-center gap-5 active:scale-95 transition-transform cursor-pointer" 
                             onclick="window.location.href='responder.html?id=${doc.id}'">
                            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center text-white shadow-lg">
                                <i class="fa-solid fa-file-signature text-lg"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="text-sm font-black uppercase tracking-tight">${data.titulo}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[8px] bg-white/10 px-2 py-0.5 rounded-full font-bold text-orange-400">NUEVO</span>
                                    <p class="text-[9px] opacity-40 font-bold uppercase tracking-tighter">ID: ${doc.id.substring(0,6)}</p>
                                </div>
                            </div>
                            <i class="fa-solid fa-chevron-right text-xs opacity-30"></i>
                        </div>`;
                    });
                }
                document.getElementById('listaEncuestas').innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
