<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartFuh">
    <link rel="apple-touch-icon" href="123.png">
    <meta name="theme-color" content="#4a2c2a">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmartFuh | Dashboard Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand: #1a0f0e; --accent: #e89c2c; }
        body { 
            margin: 0; background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; padding-bottom: 120px; 
            overflow-x: hidden; user-select: none;
        }
        
        #bg-image {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background-image: url('fondo de inicio.jpeg'); 
            background-size: cover; background-position: center;
            filter: brightness(0.35) contrast(1.1); z-index: -1;
        }
        
        /* MEJORA: Glassmorphism Refinado */
        .glass { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(25px) saturate(160%); 
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 32px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .fade-in { animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* MEJORA: Animación para las tarjetas de encuestas */
        .survey-card {
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes slideIn {
            from { transform: translateX(15px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

.bottom-nav {
        position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
        width: 92%; max-width: 420px; height: 80px;
        background: rgba(20, 10, 8, 0.85); 
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        border-radius: 40px; display: flex; justify-content: space-around; 
        align-items: center; z-index: 1000; 
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 15px 45px rgba(0,0,0,0.5);
    }

    .nav-item {
        display: flex; flex-direction: column; align-items: center;
        color: rgba(255,255,255,0.3); text-decoration: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
    }

    .nav-item i { font-size: 22px; margin-bottom: 4px; transition: 0.3s; }
    
    /* Estado activo con resplandor inferior */
    .nav-item.active { color: var(--accent); }
    .nav-item.active i { transform: translateY(-3px); text-shadow: 0 0 15px var(--accent-glow); }

    /* BOTÓN CENTRAL: SMART HUB */
    .nav-center-wrapper { 
        position: relative; top: -30px; 
    }

    .nav-center {
        width: 68px; height: 68px;
        background: linear-gradient(135deg, #e89c2c, #ffcc80);
        border-radius: 24px; display: flex; align-items: center;
        justify-content: center; color: #1a0f0e;
        transform: rotate(45deg); 
        border: 6px solid #1a0f0e;
        box-shadow: 0 10px 25px var(--accent-glow), inset 0 0 10px rgba(255,255,255,0.5);
        transition: 0.4s;
    }

    /* Icono del botón central (se rota hacia atrás para que se vea derecho) */
    .nav-center i { 
        transform: rotate(-45deg); 
        font-size: 1.8rem; 
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    /* Efecto de pulso para el botón central */
    .nav-center::before {
        content: ''; position: absolute; inset: -8px;
        border: 2px solid var(--accent); border-radius: 28px;
        animation: hub-pulse 2s infinite; opacity: 0;
    }

    @keyframes hub-pulse {
        0% { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(1.3); opacity: 0; }
    }

    .nav-center:active { transform: rotate(45deg) scale(0.9); }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <div id="update-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(15px);">
        <div class="glass" style="background: #1a0f0e; border: 1px solid #e89c2c; width: 100%; max-width: 320px; padding: 35px; text-align: center;">
            <div class="w-16 h-16 bg-orange-400/20 text-orange-400 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-bolt-lightning text-3xl"></i>
            </div>
            <h2 class="font-black italic text-xl mb-1 uppercase tracking-tighter">Nueva Versión</h2>
            <p id="v-tag" class="text-orange-400 text-[10px] font-black tracking-[3px] mb-6">VERSIÓN --</p>
            <div class="bg-black/40 p-4 rounded-2xl text-left mb-8 border border-white/5">
                <p id="v-msg" class="text-xs opacity-70 leading-relaxed"></p>
            </div>
            <button onclick="startInstallation()" class="w-full py-4 bg-orange-400 text-black rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-transform">Actualizar Sistema</button>
        </div>
    </div>

    <div id="installing-screen" style="position: fixed; inset: 0; background: #000; z-index: 110000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px);">
        <div class="relative">
            <div class="w-20 h-20 border-4 border-orange-400/10 border-top-orange-400 rounded-full animate-spin" style="border-top-color: #e89c2c;"></div>
            <i class="fa-solid fa-cloud-arrow-down absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-orange-400 text-xl"></i>
        </div>
        <h2 class="text-white font-black uppercase tracking-[5px] mt-8 text-sm">Instalando Elite</h2>
        <p id="install-progress" class="text-orange-400/60 text-[9px] font-black uppercase mt-3 tracking-widest">Sincronizando Core...</p>
    </div>

    <header class="p-8 pt-20 flex justify-between items-start fade-in">
        <div>
            <div class="flex items-center gap-2 mb-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,197,94,0.6)]"></span>
                <p class="text-[10px] font-black text-white/40 tracking-[0.4em] uppercase">SmartFuh 2026</p>
            </div>
            <h1 class="text-4xl font-black italic tracking-tighter leading-none uppercase">Hola, <br><span id="userName" class="text-orange-400">...</span></h1>
        </div>
        <button onclick="window.location.href='perfil.html'" class="relative active:scale-90 transition-transform">
            <div class="w-16 h-16 glass p-1 border-white/20 overflow-hidden rounded-[24px]">
                <img src="1234.png" class="w-full h-full object-cover rounded-[20px]">
            </div>
        </button>
    </header>

    <main class="px-6 space-y-8 mt-4">
    <section class="glass p-7 flex justify-between items-center shadow-[0_20px_50px_rgba(0,0,0,0.3)] fade-in relative overflow-hidden group" style="animation-delay: 0.2s;">
        <div class="absolute -inset-full h-full w-1/2 z-0 block transform -skew-x-12 bg-gradient-to-r from-transparent via-white/5 to-transparent group-hover:animate-[shimmer_2s_infinite]"></div>

        <div class="relative z-10 space-y-1">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-orange-400 shadow-[0_0_8px_#e89c2c]"></div>
                <span class="text-[10px] font-black uppercase opacity-60 tracking-[0.2em]" id="locationLabel">Obteniendo ubicación</span>
            </div>
            <div class="flex items-baseline gap-1">
                <h2 class="text-6xl font-black tracking-tighter" id="tempDisplay">...</h2>
                <span class="text-orange-400 font-black text-xl italic">C</span>
            </div>
            <p class="text-[9px] font-bold opacity-40 uppercase tracking-tighter">Ideal para: <span class="text-green-400">Pasear un perrito</span></p>
        </div>

        <div class="text-right z-10 flex flex-col items-end">
            <div id="weatherIconContainer" class="bg-white/5 p-4 rounded-3xl mb-2">
                <i class="fa-solid fa-sun-cloud text-4xl text-orange-400 drop-shadow-[0_0_15px_rgba(232,156,44,0.4)]"></i>
            </div>
            <p id="weatherDesc" class="text-[10px] font-black uppercase text-white tracking-[0.2em]">Despejado</p>
        </div>
    </section>

    <div class="grid grid-cols-2 gap-4 fade-in" style="animation-delay: 0.3s;">
        <div class="glass p-6 border-b-4 border-orange-400/30 relative overflow-hidden">
            <i class="fa-solid fa-heart-circle-check absolute -right-2 -bottom-2 text-5xl opacity-5"></i>
            <p class="text-[9px] font-black opacity-40 uppercase mb-3 tracking-widest">Encuestas</p>
            <div class="flex items-baseline gap-2">
                <h4 class="text-4xl font-black italic" id="stat-count">128</h4>
                <span class="text-orange-400 animate-pulse"><i class="fa-solid fa-paw text-[10px]"></i></span>
            </div>
        </div>

        <div class="glass p-6 border-b-4 border-green-400/30">
            <p class="text-[9px] font-black opacity-40 uppercase mb-3 tracking-widest">Refugio Seguro</p>
            <div class="flex flex-col gap-1">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-shield-cat text-green-400"></i>
                    <h4 class="text-[10px] font-black text-white uppercase tracking-widest">Protocolo Activo</h4>
                </div>
                <span class="text-[8px] font-bold text-green-400/60 uppercase">Estatus: Encriptado</span>
            </div>
        </div>
    </div>

    <div class="fade-in pb-12" style="animation-delay: 0.4s;">
        <div class="flex justify-between items-end mb-6 px-2">
            <div>
                <h3 class="text-[11px] font-black opacity-40 uppercase tracking-[0.3em] mb-1">Mascotas adoptadas</h3>
                <div class="h-1 w-8 bg-orange-400 rounded-full"></div>
            </div>
        </div>
        
        <div id="listaEncuestas" class="space-y-4">
            <div class="glass p-5 flex items-center gap-4 animate-pulse">
                <div class="w-16 h-16 rounded-2xl bg-white/5"></div>
                <div class="flex-1 space-y-2">
                    <div class="h-3 w-24 bg-white/10 rounded"></div>
                    <div class="h-2 w-32 bg-white/5 rounded"></div>
                </div>
                <div class="w-8 h-8 rounded-full bg-white/5"></div>
            </div>

            <div class="glass p-5 flex items-center gap-4 animate-pulse opacity-50">
                <div class="w-16 h-16 rounded-2xl bg-white/5"></div>
                <div class="flex-1 space-y-2">
                    <div class="h-3 w-24 bg-white/10 rounded"></div>
                    <div class="h-2 w-32 bg-white/5 rounded"></div>
                </div>
                <div class="w-8 h-8 rounded-full bg-white/5"></div>
            </div>
        </div>
    </div>
</main>

<style>
@keyframes shimmer {
    100% { transform: translateX(200%); }
}
</style>

    <nav class="bottom-nav" id="mainNav"></nav>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // MEJORA: Diccionario de Clima Pro
        function getWeatherInfo(code) {
            const map = {
                0: { txt: "Despejado", icon: "fa-sun" },
                1: { txt: "Casi Despejado", icon: "fa-cloud-sun" },
                2: { txt: "Parcialmente Nublado", icon: "fa-cloud-sun" },
                3: { txt: "Nublado", icon: "fa-cloud" },
                45: { txt: "Niebla", icon: "fa-smog" },
                61: { txt: "Lluvia Ligera", icon: "fa-cloud-rain" },
                95: { txt: "Tormenta", icon: "fa-bolt-lightning" }
            };
            return map[code] || { txt: "Estable", icon: "fa-cloud" };
        }

        async function updateWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                    const data = await res.json();
                    const info = getWeatherInfo(data.current_weather.weathercode);
                    
                    document.getElementById('tempDisplay').innerText = `${Math.round(data.current_weather.temperature)}°`;
                    document.getElementById('weatherDesc').innerText = info.txt;
                    document.getElementById('weatherIconContainer').innerHTML = `<i class="fa-solid ${info.icon} text-4xl text-orange-400"></i>`;
                    document.getElementById('lastUpdate').innerText = "Online";
                } catch(e) { console.log("Weather error"); }
            }, () => {
                document.getElementById('locationLabel').innerText = "Sin GPS";
            });
        }

        // MEJORA: Contador animado para stats
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }

        function buildNav(rol) {
    const nav = document.getElementById('mainNav');
    const isAdmin = (rol === 'administrador');
    
    // Obtenemos la página actual para el estado "active"
    const currentPage = window.location.pathname.split('/').pop();

    nav.innerHTML = `
        <a href="inicio.html" class="nav-item ${currentPage === 'inicio.html' ? 'active' : ''}">
        <i class="fa-solid fa-house-user"></i>
        <span>Inicio</span>
    </a>

    <a href="mapa.html" class="nav-item ${currentPage === 'mapa.html' ? 'active' : ''}">
        <i class="fa-solid fa-map-location-dot"></i>
        <span>Mapa</span>
    </a>

    <a href="${isAdmin ? 'resgistro de mascotas.html' : 'buscar.html'}" class="nav-center-wrapper">
        <div class="nav-center">
            <i class="fa-solid ${isAdmin ? 'fa-plus' : 'fa-paw'}"></i>
        </div>
    </a>

    <a href="${isAdmin ? 'reportes.html' : 'responder.html'}" class="nav-item ${currentPage === 'reportes.html' || currentPage === 'responder.html' ? 'active' : ''}">
        <i class="fa-solid ${isAdmin ? 'fa-chart-pie' : 'fa-list-check'}"></i>
        <span>${isAdmin ? 'Data' : 'Social'}</span>
    </a>

    <a href="perfil.html" class="nav-item ${currentPage === 'perfil.html' || currentPage === 'ajustes.html' ? 'active' : ''}">
        <i class="fa-solid fa-user-shield"></i>
        <span>Perfil</span>
    </a>

     <a href="ajustes.html" class="nav-item ${currentPage === 'ajustes.html' ? 'active' : ''}">
            <i class="fa-solid fa-microchip"></i>
            <span>Sistema</span>
        </a>
    `;
}

        function checkUpdates() {
            db.collection('system').doc('version_control').onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const lastSeen = localStorage.getItem('last_version_seen') || "1.0.0";
                    if (data.currentVersion !== lastSeen) {
                        window.pendingVersion = data.currentVersion;
                        document.getElementById('v-tag').innerText = `VERSIÓN ${data.currentVersion}`;
                        document.getElementById('v-msg').innerText = data.releaseNotes || "Optimizaciones de red SmartFuh.";
                        document.getElementById('update-modal').style.display = 'flex';
                    }
                }
            });
        }

        async function startInstallation() {
            document.getElementById('update-modal').style.display = 'none';
            document.getElementById('installing-screen').style.display = 'flex';
            const progressText = document.getElementById('install-progress');

            setTimeout(() => { progressText.innerText = "Reescribiendo Caché..."; }, 1500);
            setTimeout(() => { progressText.innerText = "Validando Integridad..."; }, 3000);

            setTimeout(() => {
                localStorage.setItem('last_version_seen', window.pendingVersion);
                location.reload();
            }, 5000);
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = await db.collection('usuarios').doc(user.uid).get();
                if(userDoc.exists) {
                    const userData = userDoc.data();
                    document.getElementById('userName').innerText = userData.nombre.split(' ')[0];
                    document.getElementById('locationLabel').innerText = userData.ciudad || "Sede Elite";
                    buildNav(userData.rol);
                    loadSurveys();
                    updateWeather();
                    checkUpdates();
                }
            } else { window.location.href = 'index.html'; }
        });

        async function loadSurveys() {
            const snap = await db.collection('encuestas').limit(5).get();
            const statElement = document.getElementById('stat-count');
            animateValue(statElement, 0, snap.size, 1500);

            let html = '';
            let i = 0;
            snap.forEach(doc => {
                const d = doc.data();
                html += `
                <div class="glass p-5 flex items-center gap-4 active:scale-95 transition-all survey-card" style="animation-delay: ${i * 0.1}s" onclick="window.location.href='responder.html?id=${doc.id}'">
                    <div class="w-12 h-12 rounded-2xl bg-orange-400/10 flex items-center justify-center text-orange-400 border border-orange-400/10">
                        <i class="fa-solid fa-file-signature text-lg"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="text-[12px] font-black uppercase tracking-tight text-white/90">${d.titulo || 'Módulo'}</h4>
                        <p class="text-[9px] opacity-40 font-bold uppercase tracking-widest">UID: ${doc.id.substring(0,8)}</p>
                    </div>
                    <div class="w-8 h-8 rounded-full flex items-center justify-center bg-white/5">
                        <i class="fa-solid fa-chevron-right text-[10px] opacity-20"></i>
                    </div>
                </div>`;
                i++;
            });
            document.getElementById('listaEncuestas').innerHTML = html || '<p class="text-center opacity-20 py-10 text-xs">Sin módulos activos</p>';
        }
    </script>
    <script>
    async function getWeatherData() {
        const apiKey = "TU_OPENWEATHER_API_KEY"; // Consigue una gratis en openweathermap.org
        const city = "Ciudad Obregon,MX";
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&lang=es&appid=${apiKey}`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            // 1. Actualizar Temperatura
            const temp = Math.round(data.main.temp);
            document.getElementById('tempDisplay').innerText = `${temp}°`;

            // 2. Actualizar Descripción e Icono
            const desc = data.weather[0].description;
            document.getElementById('weatherDesc').innerText = desc;
            
            // 3. Lógica de Iconos FontAwesome según el clima
            const iconContainer = document.getElementById('weatherIconContainer');
            const mainWeather = data.weather[0].main;
            let iconHtml = '';

            switch(mainWeather) {
                case 'Clear': iconHtml = '<i class="fa-solid fa-sun text-4xl text-orange-400"></i>'; break;
                case 'Clouds': iconHtml = '<i class="fa-solid fa-cloud-sun text-4xl text-orange-400"></i>'; break;
                case 'Rain': iconHtml = '<i class="fa-solid fa-cloud-showers-heavy text-4xl text-blue-400"></i>'; break;
                default: iconHtml = '<i class="fa-solid fa-sun-cloud text-4xl text-orange-400"></i>';
            }
            iconContainer.innerHTML = iconHtml;

            // 4. Lógica de Recomendación SmartPet (Crucial para perros)
            const recommendation = document.querySelector('p.text-[9px] span');
            if (temp > 32) {
                recommendation.innerText = "Mucho calor (Cuida sus patitas)";
                recommendation.className = "text-red-400";
            } else if (temp < 15) {
                recommendation.innerText = "Fresco (Lleva un suéter)";
                recommendation.className = "text-blue-400";
            } else {
                recommendation.innerText = "Paseo perfecto";
                recommendation.className = "text-green-400";
            }

        } catch (error) {
            console.error("Error obteniendo clima:", error);
            document.getElementById('locationLabel').innerText = "Offline";
        }
    }

    // Ejecutar al cargar la página
    document.addEventListener('DOMContentLoaded', getWeatherData);
</script>
</body>
</html>
