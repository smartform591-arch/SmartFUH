<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SmartFuh">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="theme-color" content="#4a2c2a">

<script>
  // Registrar el Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado', reg))
        .catch(err => console.log('Error al registrar SW', err));
    });
  }
</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>SmartFuh | Ajustes</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --brand: #4a2c2a; --accent: #e89c2c; --glass-bg: rgba(255, 255, 255, 0.1); }
        
        body { 
            margin: 0; background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; padding-bottom: 40px; 
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        #videoBG { 
            position: fixed; inset: 0; width: 100%; height: 100%; 
            object-fit: cover; opacity: 0.15; z-index: -1; filter: grayscale(40%);
        }

        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 22px;
        }

        /* Notificaciones internas */
        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; width: 90%; max-width: 350px; pointer-events: none;
        }
        .toast {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 16px 20px; border-radius: 20px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: toastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal de Confirmación */
        #confirm-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 10000; display: none; align-items: center; justify-content: center;
            padding: 24px; backdrop-filter: blur(8px);
        }

        /* Switch Custom */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; inset: 0; 
            background-color: rgba(255,255,255,0.2); 
            transition: .4s; border-radius: 34px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 18px; width: 18px; 
            left: 3px; bottom: 3px; background-color: white; 
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Modo Claro */
        body.light-mode { background: #f8fafc; color: #1e293b; }
        body.light-mode #videoBG { opacity: 0.05; }
        body.light-mode .glass { 
            background: white; border-color: rgba(0,0,0,0.05); 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="videoBG">
        <source src="12345.mp4" type="video/mp4">
    </video>

    <div id="toast-container"></div>

    <div id="confirm-modal">
        <div class="glass w-full max-w-xs p-8 text-center space-y-6">
            <div class="w-16 h-16 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto">
                <i class="fa-solid fa-power-off text-2xl"></i>
            </div>
            <h3 class="font-black italic text-xl uppercase">¿Cerrar Sesión?</h3>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 p-4 rounded-2xl bg-white/5 font-black text-[10px] uppercase">Cancelar</button>
                <button onclick="confirmLogout()" class="flex-1 p-4 rounded-2xl bg-red-500 text-white font-black text-[10px] uppercase">Salir</button>
            </div>
        </div>
    </div>

    <header class="p-8 pt-16">
        <div class="flex items-center gap-4 mb-6">
            <a href="inicio.html" class="w-10 h-10 glass flex items-center justify-center text-white hover:bg-white/20 transition">
                <i class="fa-solid fa-chevron-left text-xs"></i>
            </a>
            <h1 class="text-4xl font-black italic tracking-tighter">AJUSTES</h1>
        </div>
        <div class="h-1 w-12 bg-orange-400 rounded-full"></div>
    </header>

    <main class="px-6 space-y-6">
        
        <section class="space-y-3">
            <h3 class="text-[11px] font-bold opacity-50 uppercase tracking-[0.2em] ml-2">Preferencia Visual</h3>
            <div class="glass p-5 space-y-6">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 flex items-center justify-center rounded-full bg-orange-400/20 text-orange-400">
                            <i class="fa-solid fa-circle-half-stroke"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold">Modo Oscuro</p>
                            <p class="text-[10px] opacity-60">Alternar tema visual</p>
                        </div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="dark-mode-toggle" checked onchange="toggleDarkMode()">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-400/20 text-blue-400">
                            <i class="fa-solid fa-bell"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold">Notificaciones</p>
                            <p class="text-[10px] opacity-60">Alertas del sistema</p>
                        </div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="notify-toggle" onchange="toggleNotifications()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </section>

        <section class="space-y-3">
            <h3 class="text-[11px] font-bold opacity-50 uppercase tracking-[0.2em] ml-2">Cuenta y Seguridad</h3>
            <div class="glass p-2">
                <button onclick="window.location.href='perfil.html'" class="flex justify-between items-center w-full p-4 hover:bg-white/5 rounded-xl transition">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-user-shield opacity-70"></i>
                        <span class="text-sm font-semibold">Gestionar Perfil</span>
                    </div>
                    <i class="fa-solid fa-angle-right text-xs opacity-30"></i>
                </button>
                
                <div class="h-[1px] bg-white/5 mx-4"></div>

                <button onclick="openModal()" class="flex justify-between items-center w-full p-4 text-red-400 group">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-power-off"></i>
                        <span class="text-sm font-bold">Finalizar Sesión</span>
                    </div>
                </button>
            </div>
        </section>

        <footer class="text-center opacity-40 pt-12">
            <p class="text-[10px] font-black tracking-widest uppercase">SmartFuh v1.0.4</p>
            <p id="user-display" class="text-[9px] mt-1 italic text-orange-400">Sincronizando sesión...</p>
        </footer>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid fa-circle-check text-orange-400"></i><span class="text-[10px] font-bold uppercase">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function initTheme() {
            const isDark = localStorage.getItem('theme') !== 'light';
            document.getElementById('dark-mode-toggle').checked = isDark;
            document.body.classList.toggle('light-mode', !isDark);
        }

        function toggleDarkMode() {
            const isChecked = document.getElementById('dark-mode-toggle').checked;
            document.body.classList.toggle('light-mode', !isChecked);
            localStorage.setItem('theme', isChecked ? 'dark' : 'light');
        }

        async function toggleNotifications() {
            const toggle = document.getElementById('notify-toggle');
            if (toggle.checked) {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    showToast("Notificaciones activas");
                } else {
                    toggle.checked = false;
                    showToast("Permiso denegado");
                }
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('user-display').textContent = user.email;
            } else {
                window.location.href = 'inicio.html';
            }
        });

        // Modal Logic
        function openModal() { document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function confirmLogout() { auth.signOut().then(() => window.location.href = 'inicio.html'); }

        initTheme();
    </script>
</body>
</html>
