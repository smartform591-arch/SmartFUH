<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmartFuh | Ajustes Titan</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;800&family=Playfair+Display:ital,wght@0,700;1,900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --brand: #140d0c; 
            --accent: #e89c2c; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        
        /* Tipografías Dinámicas */
        .font-modern { font-family: 'Inter', sans-serif; }
        .font-tech { font-family: 'JetBrains Mono', monospace; }
        .font-elegant { font-family: 'Playfair Display', serif; }

        body { 
            margin: 0; background: var(--brand); color: white; 
            padding-bottom: 120px; transition: all 0.5s ease; overflow-x: hidden;
        }

        #videoBG { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.12; z-index: -1; }

        .glass { 
            background: var(--glass); backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); border: 1px solid var(--border); 
            border-radius: 30px;
        }

        .input-elite {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            border-radius: 16px; padding: 14px; color: white; font-size: 14px; outline: none; width: 100%;
        }

        /* Botón Flotante de Inicio */
        .home-btn {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--accent); color: #140d0c; border-radius: 20px;
            display: flex; items-center; justify-content: center; font-size: 24px;
            box-shadow: 0 10px 30px rgba(232, 156, 44, 0.4); z-index: 999;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .home-btn:active { transform: scale(0.9) rotate(-10deg); }

        /* Switches */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.05); transition: .4s; border-radius: 34px; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .accent-dot { width: 30px; height: 30px; border-radius: 10px; cursor: pointer; border: 3px solid transparent; }
        .accent-dot.active { border-color: white; transform: translateY(-5px); }
        
        #admin-panel { display: none; }
    </style>
</head>
<body class="font-modern">

    <video autoplay muted loop playsinline id="videoBG">
        <source src="12345.mp4" type="video/mp4">
    </video>

    <a href="inicio.html" class="home-btn">
        <i class="fa-solid fa-house"></i>
    </a>

    <div id="update-modal" class="fixed inset-0 bg-black/95 z-[10000] hidden items-center justify-center p-6 backdrop-blur-2xl">
        <div class="glass p-10 w-full max-w-sm text-center space-y-6">
            <div class="w-20 h-20 bg-orange-500 rounded-3xl flex items-center justify-center mx-auto shadow-2xl">
                <i class="fa-solid fa-cloud-arrow-up text-3xl text-white"></i>
            </div>
            <h2 data-i18n="update_title" class="text-2xl font-black uppercase">Nueva Mejora</h2>
            <p id="modal-v-notes" class="text-sm opacity-60 italic"></p>
            <button onclick="location.reload()" data-i18n="update_btn" class="w-full py-4 bg-white text-black font-black uppercase text-[10px] rounded-2xl">Actualizar</button>
        </div>
    </div>

    <div id="toast-container"></div>

    <header class="p-8 pt-20 flex justify-between items-start">
        <div class="space-y-1">
            <div class="flex items-center gap-2 mb-2">
                <button onclick="changeLang('es')" class="text-[9px] font-black opacity-40 hover:opacity-100">ES</button>
                <span class="opacity-20">|</span>
                <button onclick="changeLang('en')" class="text-[9px] font-black opacity-40 hover:opacity-100">EN</button>
            </div>
            <h1 data-i18n="nav_title" class="text-4xl font-black italic tracking-tighter uppercase leading-tight">Configuración</h1>
        </div>
        <div class="text-right">
            <div id="network-status" class="px-3 py-1 rounded-full bg-green-500/10 text-green-500 text-[8px] font-black uppercase border border-green-500/20">Online</div>
            <p id="session-time" class="text-[8px] opacity-40 font-bold mt-2 uppercase italic">00:00 session</p>
        </div>
    </header>

    <main class="px-6 space-y-6">

        <section class="glass p-6 flex items-center gap-5">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-orange-400 to-red-600 flex items-center justify-center text-white text-2xl font-black shadow-xl" id="user-initials">--</div>
            <div class="flex-1">
                <input type="text" id="display-name-input" class="bg-transparent border-none p-0 w-full font-black text-xl outline-none" placeholder="User">
                <p id="user-email-label" class="text-[10px] opacity-40 font-bold uppercase tracking-widest italic">Cargando...</p>
            </div>
            <button onclick="updateProfile()" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-orange-400 border border-white/5">
                <i class="fa-solid fa-floppy-disk"></i>
            </button>
        </section>

        <section id="admin-panel" class="glass p-6 space-y-4 border-orange-500/30">
            <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-[0.3em]">Developer Engine</h3>
            <input type="text" id="admin-v-input" class="input-elite" placeholder="Versión: 2.0.0">
            <textarea id="admin-notes-input" class="input-elite h-20" placeholder="Cambios..."></textarea>
            <button onclick="pushUpdate()" class="w-full py-4 bg-orange-500 text-black font-black text-[11px] uppercase rounded-xl">Publicar Sistema</button>
        </section>

        <section class="space-y-3">
            <h3 data-i18n="sec_font" class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] ml-2">Estilo de Texto</h3>
            <div class="glass p-4 flex gap-3">
                <button onclick="setFont('font-modern')" class="flex-1 py-3 glass text-[10px] font-black uppercase rounded-xl hover:bg-white/10">Modern</button>
                <button onclick="setFont('font-tech')" class="flex-1 py-3 glass text-[10px] font-black uppercase rounded-xl hover:bg-white/10">Tech</button>
                <button onclick="setFont('font-elegant')" class="flex-1 py-3 glass text-[10px] font-black uppercase rounded-xl hover:bg-white/10">Classic</button>
            </div>
        </section>

        <section class="space-y-3">
            <h3 data-i18n="sec_style" class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] ml-2">Apariencia</h3>
            <div class="glass p-6 space-y-6">
                <div class="flex justify-between items-center">
                    <span data-i18n="opt_accent" class="text-sm font-bold">Color Principal</span>
                    <div class="flex gap-2">
                        <div class="accent-dot bg-orange-500 active" onclick="setAccent('#e89c2c', this)"></div>
                        <div class="accent-dot bg-cyan-400" onclick="setAccent('#22d3ee', this)"></div>
                        <div class="accent-dot bg-pink-500" onclick="setAccent('#ec4899', this)"></div>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <p data-i18n="opt_saver" class="text-sm font-bold">Modo Ahorro</p>
                        <p class="text-[9px] opacity-40 font-bold uppercase">Static Background</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="data-saver" onchange="toggleVideo()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </section>

        <section class="glass p-6 space-y-2">
            <h3 class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mb-4">System Data</h3>
            <div class="flex justify-between text-[10px] font-bold">
                <span class="opacity-40 uppercase">Resolución</span>
                <span id="screen-res">---</span>
            </div>
            <div class="flex justify-between text-[10px] font-bold">
                <span class="opacity-40 uppercase">Motor</span>
                <span id="browser-info">---</span>
            </div>
        </section>

        <button onclick="handleLogout()" class="w-full py-6 glass text-red-500 font-black text-[12px] uppercase tracking-[0.4em] flex items-center justify-center gap-4">
            <i class="fa-solid fa-power-off"></i>
            <span data-i18n="btn_logout">Cerrar Sesión</span>
        </button>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // RECUERDA CAMBIAR ESTE CORREO POR EL TUYO
        const ADMIN_EMAIL = "tu-correo@gmail.com";

        // DICCIONARIO MULTILENGUAJE
        const translations = {
            es: {
                nav_title: "Ajustes",
                update_title: "Mejora Lista",
                update_btn: "Instalar",
                sec_font: "Tipo de Letra",
                sec_style: "Estilo Visual",
                opt_accent: "Color de Acento",
                opt_saver: "Ahorro de Datos",
                btn_logout: "Cerrar Sesión"
            },
            en: {
                nav_title: "Settings",
                update_title: "Update Ready",
                update_btn: "Install",
                sec_font: "Typography",
                sec_style: "Visual Style",
                opt_accent: "Accent Color",
                opt_saver: "Data Saver",
                btn_logout: "Sign Out"
            }
        };

        // --- SISTEMA DE LENGUAJE ---
        function changeLang(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
            localStorage.setItem('fuh_lang', lang);
        }

        // --- SISTEMA DE FUENTES ---
        function setFont(fontClass) {
            document.body.classList.remove('font-modern', 'font-tech', 'font-elegant');
            document.body.classList.add(fontClass);
            localStorage.setItem('fuh_font', fontClass);
            showToast("Fuente Actualizada");
        }

        // --- INFO DE HARDWARE ---
        document.getElementById('screen-res').innerText = `${window.screen.width}x${window.screen.height}`;
        document.getElementById('browser-info').innerText = navigator.vendor || 'Webkit Engine';

        // --- CORE FIREBASE ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('user-email-label').innerText = user.email;
                document.getElementById('display-name-input').value = user.displayName || "";
                document.getElementById('user-initials').innerText = (user.displayName || user.email).substring(0, 2).toUpperCase();
                if (user.email === ADMIN_EMAIL) document.getElementById('admin-panel').style.display = 'block';
                checkUpdates();
            } else { window.location.href = 'index.html'; }
        });

        async function updateProfile() {
            const name = document.getElementById('display-name-input').value;
            await auth.currentUser.updateProfile({ displayName: name });
            document.getElementById('user-initials').innerText = name.substring(0, 2).toUpperCase();
            showToast("Sincronizado");
        }

        function setAccent(color, el) {
            document.documentElement.style.setProperty('--accent', color);
            document.querySelectorAll('.accent-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            localStorage.setItem('fuh_accent', color);
        }

        function toggleVideo() {
            const isSaving = document.getElementById('data-saver').checked;
            document.getElementById('videoBG').style.opacity = isSaving ? '0' : '0.12';
            localStorage.setItem('fuh_datasaver', isSaving);
        }

        async function pushUpdate() {
            const v = document.getElementById('admin-v-input').value;
            const n = document.getElementById('admin-notes-input').value;
            await db.collection('system').doc('version_control').set({
                currentVersion: v, releaseNotes: n, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast("Build Propagada");
        }

        async function checkUpdates() {
            const doc = await db.collection('system').doc('version_control').get();
            if (doc.exists && doc.data().currentVersion !== localStorage.getItem('fuh_version')) {
                document.getElementById('modal-v-notes').innerText = doc.data().releaseNotes;
                document.getElementById('update-modal').classList.replace('hidden', 'flex');
                localStorage.setItem('fuh_version', doc.data().currentVersion);
            }
        }

        function showToast(msg) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'bg-white text-black px-6 py-3 rounded-2xl font-black text-[10px] uppercase mb-2 text-center shadow-2xl';
            t.innerText = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function handleLogout() { auth.signOut(); }

        // SESIÓN TIMER
        let startTime = Date.now();
        setInterval(() => {
            let diff = Math.floor((Date.now() - startTime) / 1000);
            let mins = Math.floor(diff / 60).toString().padStart(2, '0');
            let secs = (diff % 60).toString().padStart(2, '0');
            document.getElementById('session-time').innerText = `${mins}:${secs} session`;
        }, 1000);

        // AUTO-LOAD PREFERENCES
        const savedLang = localStorage.getItem('fuh_lang') || 'es';
        changeLang(savedLang);

        const savedFont = localStorage.getItem('fuh_font');
        if(savedFont) setFont(savedFont);

        const savedAccent = localStorage.getItem('fuh_accent');
        if(savedAccent) document.documentElement.style.setProperty('--accent', savedAccent);
    </script>
</body>
</html>
