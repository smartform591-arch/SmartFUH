<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>SmartFuh | Responder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #4a2c2a; --accent: #e89c2c; }
        body { 
            margin: 0; background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; padding-bottom: 120px; 
        }
        #videoBG { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.25; z-index: -1; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            border-radius: 28px; 
        }

        /* Notificaciones internas */
        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; width: 90%; max-width: 350px; pointer-events: none;
        }
        .toast {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 16px 20px; border-radius: 20px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: toastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }

        /* Barra de progreso */
        .progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; margin-top: 10px;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--accent);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--accent);
        }
        
        .input-text { 
            width: 100%; background: rgba(255,255,255,0.05); 
            border: 1.5px solid rgba(255,255,255,0.1); 
            border-radius: 18px; padding: 18px; color: white; 
            outline: none; transition: 0.3s; font-weight: 500;
        }
        .input-text:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            padding: 18px; border-radius: 20px;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 12px;
        }
        .option-card.selected {
            background: rgba(232, 156, 44, 0.15);
            border-color: var(--accent);
        }

        .btn-submit {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; background: var(--accent); color: var(--brand);
            font-weight: 900; padding: 20px; border-radius: 24px; 
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4); z-index: 100;
            transition: 0.3s;
        }
        .btn-submit:disabled { opacity: 0.5; filter: grayscale(1); }

        /* Pantalla de Éxito Fullscreen */
        #success-screen {
            position: fixed; inset: 0; background: var(--brand); z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="videoBG"><source src="12345.mp4" type="video/mp4"></video>

    <div id="toast-container"></div>

    <div id="success-screen">
        <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mb-6 animate-bounce">
            <i class="fa-solid fa-check text-4xl text-white"></i>
        </div>
        <h2 class="text-2xl font-black italic mb-2">¡ENVÍO EXITOSO!</h2>
        <p class="opacity-60 text-sm uppercase tracking-widest mb-8">Tus respuestas han sido procesadas</p>
        <button onclick="window.location.href='inicio.html'" class="glass px-8 py-4 text-xs font-black uppercase tracking-tighter">
            Volver al Inicio
        </button>
    </div>

    <header class="p-8 pt-12">
        <div class="flex items-center justify-between mb-4">
            <button onclick="window.location.href='inicio.html'" class="w-12 h-12 glass flex items-center justify-center text-white">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="text-right">
                <h1 id="survey-title" class="text-xl font-black italic text-white tracking-tighter uppercase">Cargando...</h1>
                <p class="text-[9px] uppercase font-black text-orange-400 tracking-[0.2em]">Formulario Seguro</p>
            </div>
        </div>
        
        <div class="flex justify-between items-end mb-1">
            <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Tu progreso</span>
            <span id="progress-text" class="text-[10px] font-black text-orange-400">0%</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </header>

    <main id="questions-container" class="px-6 space-y-6 pb-32">
        <div class="flex flex-col items-center justify-center py-20 opacity-30">
            <i class="fa-solid fa-circle-notch animate-spin text-4xl mb-4"></i>
            <p class="text-[10px] font-bold uppercase tracking-widest">Sincronizando...</p>
        </div>
    </main>

    <button onclick="enviarRespuestas()" class="btn-submit" id="btn-enviar" style="display: none;">
        Enviar Formulario
    </button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showMessage(text, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'border-l-4 border-red-500' : ''}`;
            toast.innerHTML = `<i class="fa-solid fa-circle-info ${type === 'error' ? 'text-red-500' : 'text-orange-400'}"></i>
                               <span class="text-[10px] font-bold uppercase tracking-tight">${text}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const surveyId = urlParams.get('id');
        let surveyData = null;
        let totalPreguntas = 0;

        async function cargarEncuesta() {
            if (!surveyId) { window.location.href = 'inicio.html'; return; }
            try {
                const doc = await db.collection('encuestas').doc(surveyId).get();
                if (!doc.exists) {
                    showMessage("Esta encuesta ya no existe", "error");
                    setTimeout(() => window.location.href = 'inicio.html', 2000);
                    return;
                }
                surveyData = doc.data();
                totalPreguntas = surveyData.preguntas.length;
                document.getElementById('survey-title').innerText = surveyData.titulo;
                renderizarPreguntas(surveyData.preguntas);
                document.getElementById('btn-enviar').style.display = 'block';
                actualizarProgreso();
            } catch (e) { showMessage("Error de conexión", "error"); }
        }

        function renderizarPreguntas(preguntas) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            preguntas.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'glass p-8 space-y-5';
                let inputHTML = p.tipo === 'texto' ? 
                    `<input type="text" class="input-text resp-input" data-index="${index}" placeholder="Tu respuesta..." oninput="actualizarProgreso()">` :
                    `<div class="space-y-3">${p.opciones.map(opt => `
                        <div class="option-card" onclick="seleccionarOpcion(this, ${index}, '${opt}')">
                            <i class="fa-regular fa-circle"></i>
                            <span class="text-sm font-bold">${opt}</span>
                        </div>`).join('')}</div><input type="hidden" class="resp-input" data-index="${index}">`;

                div.innerHTML = `<div class="flex justify-between items-center"><span class="text-[9px] font-black bg-orange-400 text-[#4a2c2a] px-3 py-1 rounded-full uppercase">Item ${index + 1}</span></div>
                                 <h3 class="text-lg font-black italic tracking-tight">${p.texto}</h3>${inputHTML}`;
                container.appendChild(div);
            });
        }

        function seleccionarOpcion(el, qIndex, valor) {
            const parent = el.parentElement;
            parent.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('selected');
                card.querySelector('i').className = 'fa-regular fa-circle';
            });
            el.classList.add('selected');
            el.querySelector('i').className = 'fa-solid fa-circle-check text-orange-400 animate-pulse';
            document.querySelector(`input[data-index="${qIndex}"]`).value = valor;
            actualizarProgreso();
        }

        function actualizarProgreso() {
            const inputs = document.querySelectorAll('.resp-input');
            let respondidas = 0;
            inputs.forEach(i => { if(i.value.trim() !== '') respondidas++; });
            const porcentaje = Math.round((respondidas / totalPreguntas) * 100);
            document.getElementById('progress-bar').style.width = porcentaje + '%';
            document.getElementById('progress-text').innerText = porcentaje + '%';
            document.getElementById('btn-enviar').disabled = (respondidas < totalPreguntas);
        }

        async function enviarRespuestas() {
            const btn = document.getElementById('btn-enviar');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> PROCESANDO...`;

            try {
                const user = auth.currentUser;
                let nombreFinal = "Invitado";
                if(user) {
                    const userDoc = await db.collection('usuarios').doc(user.uid).get();
                    nombreFinal = userDoc.exists ? userDoc.data().nombre : user.email;
                }

                const respuestas = Array.from(document.querySelectorAll('.resp-input')).map(i => i.value);

                await db.collection('respuestas').add({
                    encuestaId: surveyId,
                    tituloEncuesta: surveyData.titulo,
                    usuarioId: user ? user.uid : 'anonimo',
                    usuarioNombre: nombreFinal,
                    respuestas: respuestas,
                    fecha: new Date()
                });

                document.getElementById('success-screen').style.display = 'flex';
            } catch (e) {
                showMessage("Fallo en el servidor", "error");
                btn.disabled = false;
                btn.innerText = "Reintentar Envío";
            }
        }

        cargarEncuesta();
    </script>
</body>
</html>
