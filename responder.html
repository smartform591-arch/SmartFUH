<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmartPet | Red Social Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand: #1a0f0e; --accent: #e89c2c; }
        body { 
            background: var(--brand); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding-bottom: 100px; overflow-x: hidden;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; 
        }
        .feed-card { animation: slideUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-interact:active { transform: scale(0.8); transition: 0.1s; }
        .like-active { color: #ef4444 !important; animation: heartBeat 0.3s ease; }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .hashtag { color: #e89c2c; font-weight: 900; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="fixed top-0 inset-x-0 z-50 bg-[#1a0f0e]/90 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="inicio.html" class="w-10 h-10 glass flex items-center justify-center text-white/50 active:scale-90 transition-all">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter leading-none">SMART<span class="text-orange-400">FEED</span></h1>
                <p class="text-[7px] font-black opacity-40 tracking-[0.4em] uppercase">Comunidad Global</p>
            </div>
        </div>
        <button onclick="toggleModal()" class="w-12 h-12 bg-orange-400 text-black rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
            <i class="fa-solid fa-plus text-xl"></i>
        </button>
    </nav>

    <div class="h-24"></div>

    <main id="feedContainer" class="px-4 space-y-6 max-w-lg mx-auto pb-20">
        <div id="loadingState" class="space-y-6">
            <div class="glass h-80 w-full animate-pulse opacity-20"></div>
        </div>
    </main>

    <div id="postModal" class="fixed inset-0 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-sm" onclick="toggleModal()"></div>
        <div class="glass w-full max-w-md p-8 space-y-5 relative border-t border-white/10 animate-[slideUp_0.3s]">
            <div class="text-center">
                <h2 class="text-2xl font-black italic italic uppercase">Crear <span class="text-orange-400">Post</span></h2>
            </div>

            <div onclick="document.getElementById('fileInput').click()" class="w-full aspect-video rounded-[24px] border-2 border-dashed border-white/10 flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden">
                <i class="fa-solid fa-image text-3xl opacity-20"></i>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImage(event)">
            </div>

            <div class="space-y-3">
                <input type="text" id="postAuthor" placeholder="TU NOMBRE / ALIAS" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black tracking-widest outline-none focus:border-orange-400 uppercase">
                
                <select id="postCategory" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black uppercase text-orange-400 outline-none">
                    <option value="General">🏷️ General</option>
                    <option value="Urgente">🚨 Emergencia</option>
                    <option value="Adopción">🏠 Adopción</option>
                    <option value="Extravío">🔍 Extravío</option>
                </select>

                <textarea id="postDesc" placeholder="¿Qué quieres compartir? Usa #hashtags..." rows="3" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs font-medium outline-none focus:border-orange-400"></textarea>
            </div>

            <button onclick="savePost()" id="btnPublish" class="w-full py-5 bg-orange-400 text-black rounded-2xl font-black uppercase text-[11px] tracking-[3px] shadow-xl active:scale-95 transition-all">
                Publicar en SmartPet
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
    // Configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
  authDomain: "smartform-ee4bb.firebaseapp.com",
  projectId: "smartform-ee4bb",
  storageBucket: "smartform-ee4bb.firebasestorage.app",
  messagingSenderId: "590912576678",
  appId: "1:590912576678:web:5dd2406d46b31ada5b6867",
  measurementId: "G-07XSZSSCQ5"
    };

    // Inicialización única
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // --- UTILIDADES DE UI ---
    
    const toggleModal = () => document.getElementById('postModal').classList.toggle('hidden');

    function previewImage(event) {
        const preview = document.getElementById('previewImg');
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                preview.src = e.target.result; 
                preview.classList.remove('hidden'); 
            };
            reader.readAsDataURL(file);
        }
    }

    const formatText = (text) => text.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');

    // --- LÓGICA DE BASE DE DATOS ---

    async function savePost() {
        const authorInput = document.getElementById('postAuthor');
        const descInput = document.getElementById('postDesc');
        const categoryInput = document.getElementById('postCategory');
        const previewImg = document.getElementById('previewImg');
        const btn = document.getElementById('btnPublish');

        // Validaciones
        if (!descInput.value.trim() || previewImg.classList.contains('hidden')) {
            return alert("⚠️ Por favor, añade una imagen y una descripción.");
        }

        btn.disabled = true;
        btn.innerText = "PUBLICANDO...";

        const newPost = {
            autor: authorInput.value.trim() || "Anónimo",
            titulo: categoryInput.value,
            descripcion: descInput.value.trim(),
            foto: previewImg.src,
            fecha: Date.now(),
            likes: 0,
            comentarios: 0
        };

        try {
            await db.collection('social_feed').add(newPost);
            
            // Resetear formulario
            authorInput.value = '';
            descInput.value = '';
            previewImg.classList.add('hidden');
            toggleModal();
            alert("✨ ¡Publicado con éxito!");
        } catch (error) {
            console.error("Error al guardar:", error);
            alert("❌ Hubo un problema al subir tu post.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Publicar en SmartPet";
        }
    }

    async function handleLike(id, btn) {
        const isLiked = btn.classList.toggle('like-active');
        const postRef = db.collection('social_feed').doc(id);
        
        // Efecto visual inmediato
        const countSpan = btn.querySelector('.count');
        let currentCount = parseInt(countSpan.innerText);
        countSpan.innerText = isLiked ? currentCount + 1 : currentCount - 1;

        // Actualización real en Firebase (Atomic increment)
        try {
            await postRef.update({
                likes: firebase.firestore.FieldValue.increment(isLiked ? 1 : -1)
            });
        } catch (e) {
            console.error("Error al dar like:", e);
        }
    }

    function handleComment(id) {
        const comment = prompt("Escribe tu comentario:");
        if (comment && comment.trim() !== "") {
            db.collection('social_feed').doc(id).update({
                comentarios: firebase.firestore.FieldValue.increment(1)
            });
            alert("✅ Comentario enviado");
        }
    }

    async function sharePost(title, text) {
        const shareData = { title, text, url: window.location.href };
        try {
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("🔗 Enlace copiado al portapapeles");
            }
        } catch (err) {
            console.log("Error al compartir:", err);
        }
    }

    // --- CARGA EN TIEMPO REAL ---

    function loadFeed() {
        const container = document.getElementById('feedContainer');
        
        // onSnapshot escucha cambios sin recargar la página
        db.collection('social_feed').orderBy('fecha', 'desc').onSnapshot((querySnapshot) => {
            container.innerHTML = ''; // Limpiar feed
            
            if (querySnapshot.empty) {
                container.innerHTML = '<p class="text-center opacity-30 py-10">No hay publicaciones aún...</p>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const card = `
                    <article class="glass overflow-hidden feed-card mb-6">
                        <div class="p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full border-2 border-orange-400 p-0.5">
                                    <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(data.autor)}&background=e89c2c&color=1a0f0e" class="w-full h-full rounded-full">
                                </div>
                                <div>
                                    <p class="text-[11px] font-black uppercase tracking-tighter">${data.autor} <i class="fa-solid fa-circle-check text-[8px] text-blue-400 ml-1"></i></p>
                                    <p class="text-[8px] opacity-40 font-bold uppercase tracking-[0.2em]">${data.titulo}</p>
                                </div>
                            </div>
                            <span class="text-[8px] opacity-20 font-black">${new Date(data.fecha).toLocaleDateString()}</span>
                        </div>

                        <div class="px-2">
                            <img src="${data.foto}" class="w-full aspect-square object-cover rounded-[24px]" loading="lazy">
                        </div>

                        <div class="p-5 space-y-4">
                            <div class="flex items-center justify-between">
                                <div class="flex gap-5">
                                    <button onclick="handleLike('${doc.id}', this)" class="btn-interact flex items-center gap-1.5 text-white/60">
                                        <i class="fa-solid fa-heart text-xl"></i>
                                        <span class="text-[10px] font-black count">${data.likes || 0}</span>
                                    </button>
                                    <button onclick="handleComment('${doc.id}')" class="btn-interact flex items-center gap-1.5 text-white/60">
                                        <i class="fa-solid fa-comment text-xl"></i>
                                        <span class="text-[10px] font-black">${data.comentarios || 0}</span>
                                    </button>
                                    <button onclick="sharePost('${data.titulo}', '${data.descripcion}')" class="btn-interact text-white/60">
                                        <i class="fa-solid fa-paper-plane text-xl"></i>
                                    </button>
                                </div>
                                <button class="text-white/20"><i class="fa-solid fa-bookmark text-xl"></i></button>
                            </div>

                            <div class="space-y-1">
                                <p class="text-[13px] leading-snug font-medium text-white/80">
                                    <span class="font-black text-white mr-1 uppercase text-[11px]">${data.autor}</span>
                                    ${formatText(data.descripcion)}
                                </p>
                            </div>
                            
                            <button onclick="handleComment('${doc.id}')" class="text-[10px] opacity-30 font-black uppercase tracking-widest hover:opacity-100 transition-all">Ver comentarios...</button>
                        </div>
                    </article>
                `;
                container.innerHTML += card;
            });
        }, (error) => {
            console.error("Error en Snapshot:", error);
            container.innerHTML = '<p class="text-center text-red-500">Error al conectar con la comunidad.</p>';
        });
    }

    // Arrancar la aplicación
    document.addEventListener('DOMContentLoaded', loadFeed);
</script>
</body>
</html>
