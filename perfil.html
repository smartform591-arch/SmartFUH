<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartFuh">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#1a0f0e">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmartFuh | Terminal de Agente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand: #1a0f0e; --accent: #e89c2c; --error: #ef4444; }
        
        body { 
            margin: 0; background: var(--brand); color: white; 
            font-family: 'Inter', sans-serif; padding-bottom: env(safe-area-inset-bottom);
            opacity: 0; transition: opacity 0.5s ease; overflow-x: hidden;
        }

        #bg-image {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background-image: url('fondo de login.jpeg'); 
            background-size: cover; background-position: center;
            filter: brightness(0.2) contrast(1.2); z-index: -1;
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 35px; 
        }

        /* Avatar System */
        .avatar-frame {
            position: relative; width: 130px; height: 130px;
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 4px solid var(--accent);
            box-shadow: 0 0 30px rgba(232, 156, 44, 0.3);
        }
        .btn-camera {
            position: absolute; bottom: 0; right: 0;
            width: 42px; height: 42px; background: var(--accent);
            border-radius: 50%; display: flex; items-center; justify-content: center;
            color: var(--brand); border: 4px solid var(--brand);
            font-size: 16px; cursor: pointer; transition: 0.3s;
        }

        /* Editor Modal (Bottom Sheet) */
        #edit-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            height: auto; background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 10001; transition: bottom 0.4s cubic-bezier(0.32, 1, 0.23, 1);
            padding: 30px; border-radius: 40px 40px 0 0;
        }
        #edit-panel.active { bottom: 0; }

        .input-dark {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 20px; color: white;
            font-weight: 700; outline: none; transition: 0.3s;
        }
        .input-dark:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        /* Custom Toast */
        .toast-box {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            z-index: 11000; width: 85%; max-width: 400px;
            pointer-events: none;
        }
        .toast-item {
            background: var(--accent); color: var(--brand);
            padding: 18px 25px; border-radius: 20px; font-weight: 900;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
            animation: toastEnter 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes toastEnter { from { opacity: 0; transform: translateY(-30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Overlay */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px); z-index: 10000; display: none;
        }
    </style>
</head>
<body>
    <div id="bg-image"></div>
    <div id="toast-container" class="toast-box"></div>
    <div id="modal-overlay" class="overlay" onclick="closeAllModals()"></div>

    <div id="edit-panel">
        <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-8"></div>
        <h3 id="edit-title" class="text-2xl font-black italic uppercase tracking-tighter mb-2 text-orange-400">Editar Campo</h3>
        <p class="text-[10px] opacity-40 font-black uppercase tracking-widest mb-6">Modificar datos del servidor seguro</p>
        
        <input type="text" id="edit-input" class="input-dark mb-6" placeholder="Escribe aquí...">
        
        <div class="flex gap-3">
            <button onclick="closeAllModals()" class="flex-1 p-5 rounded-2xl bg-white/5 font-black text-[11px] uppercase tracking-widest">Cancelar</button>
            <button onclick="saveFieldUpdate()" class="flex-1 p-5 rounded-2xl bg-orange-400 text-black font-black text-[11px] uppercase tracking-widest">Guardar Cambios</button>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 z-[10005] hidden items-center justify-center p-6 backdrop-blur-xl bg-black/60">
        <div class="glass w-full max-w-xs p-10 text-center space-y-8">
            <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto border border-red-500/20">
                <i class="fa-solid fa-power-off text-3xl"></i>
            </div>
            <div>
                <h3 class="text-2xl font-black italic uppercase tracking-tighter">Cerrar Sesión</h3>
                <p class="text-[10px] opacity-40 font-bold uppercase mt-2">¿Confirmas la desconexión del terminal?</p>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="confirmLogout()" class="w-full p-5 rounded-2xl bg-red-500 text-white font-black text-[11px] uppercase tracking-widest">Desconectar</button>
                <button onclick="document.getElementById('confirm-modal').style.display='none'" class="w-full p-5 rounded-2xl bg-white/5 font-black text-[11px] uppercase tracking-widest">Volver</button>
            </div>
        </div>
    </div>

    <header class="p-8 pt-16 flex items-center justify-between sticky top-0 z-40 bg-gradient-to-b from-[#1a0f0e] to-transparent">
        <div class="flex items-center gap-4">
            <a href="inicio.html" class="w-12 h-12 glass flex items-center justify-center text-white active:scale-90 transition-transform">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <h1 class="text-3xl font-black italic tracking-tighter">MI PERFIL</h1>
        </div>
    </header>

    <main class="px-6 space-y-6">
        <section class="glass p-10 flex flex-col items-center text-center">
            <div class="avatar-frame mb-6">
                <img id="p-avatar-img" src="https://via.placeholder.com/150" class="avatar-img" alt="Avatar">
                <label for="avatar-upload" class="btn-camera">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="uploadAvatar(this)">
            </div>
            <h2 id="p-nombre" class="text-3xl font-black italic uppercase tracking-tighter">Cargando...</h2>
            <p id="p-rol" class="text-[10px] font-black text-orange-400 uppercase tracking-[0.3em] mt-2 opacity-80">---</p>
        </section>

        <section class="glass overflow-hidden divide-y divide-white/5">
            <div class="p-6 flex justify-between items-center" onclick="openEditor('telefono', 'Teléfono de Contacto')">
                <div class="space-y-1">
                    <span class="text-[9px] uppercase font-black opacity-30 tracking-widest">Teléfono</span>
                    <p id="p-telefono" class="text-sm font-bold">---</p>
                </div>
                <i class="fa-solid fa-angle-right opacity-20 text-xs"></i>
            </div>

            <div class="p-6">
                <div class="space-y-1">
                    <span class="text-[9px] uppercase font-black opacity-30 tracking-widest">Email Corporativo</span>
                    <p id="p-correo" class="text-sm font-bold opacity-60">---</p>
                </div>
            </div>

            <div class="p-6 flex justify-between items-center" onclick="openEditor('direccion', 'Ubicación Operativa')">
                <div class="space-y-1 pr-4">
                    <span class="text-[9px] uppercase font-black opacity-30 tracking-widest">Dirección</span>
                    <p id="p-direccion" class="text-sm font-bold leading-snug">---</p>
                </div>
                <i class="fa-solid fa-angle-right opacity-20 text-xs"></i>
            </div>

            <div class="p-6 bg-black/20">
                <span class="text-[9px] uppercase font-black opacity-30 tracking-widest">Protocolo UID</span>
                <p id="p-uid" class="text-[10px] font-mono opacity-40 truncate mt-1">---</p>
            </div>
        </section>

        <button onclick="openLogoutModal()" class="w-full bg-white/5 p-6 rounded-[32px] font-black text-red-500 border border-white/5 flex items-center justify-center gap-4 transition-all active:scale-95">
            <i class="fa-solid fa-power-off"></i>
            FINALIZAR CONEXIÓN
        </button>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBiiY9GSlF-7r3wjBwcLCq5jyxKVOjAAE",
            authDomain: "smartform-ee4bb.firebaseapp.com",
            projectId: "smartform-ee4bb",
            storageBucket: "smartform-ee4bb.firebasestorage.app",
            messagingSenderId: "590912576678",
            appId: "1:590912576678:web:5dd2406d46b31ada5b6867"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentField = '';

        function showMessage(text) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast-item';
            t.innerHTML = `<i class="fa-solid fa-bolt"></i> ${text}`;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.body.style.opacity = "1";
                try {
                    db.collection('usuarios').doc(user.uid).onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            document.getElementById('p-nombre').innerText = data.nombre || "Agente Desconocido";
                            document.getElementById('p-correo').innerText = user.email;
                            document.getElementById('p-uid').innerText = user.uid;
                            document.getElementById('p-rol').innerText = (data.rol || 'Externo').toUpperCase();
                            document.getElementById('p-telefono').innerText = data.telefono || "No registrado";
                            document.getElementById('p-direccion').innerText = data.direccion || "No registrada";
                            if (data.avatar) document.getElementById('p-avatar-img').src = data.avatar;
                        }
                    });
                } catch (e) { showMessage("Error de enlace"); }
            } else { window.location.href = 'index.html'; }
        });

        // Editor Logic
        function openEditor(field, title) {
            if (window.navigator.vibrate) window.navigator.vibrate(10);
            currentField = field;
            document.getElementById('edit-title').innerText = title;
            document.getElementById('edit-input').value = document.getElementById(`p-${field}`).innerText;
            document.getElementById('edit-panel').classList.add('active');
            document.getElementById('modal-overlay').style.display = 'block';
            setTimeout(() => document.getElementById('edit-input').focus(), 400);
        }

        async function saveFieldUpdate() {
            const val = document.getElementById('edit-input').value;
            if (!val.trim()) return;

            try {
                const user = auth.currentUser;
                await db.collection('usuarios').doc(user.uid).update({ [currentField]: val });
                showMessage("Servidor Actualizado");
                closeAllModals();
            } catch (e) { showMessage("Error de Escritura"); }
        }

        // Avatar Logic
        function uploadAvatar(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                try {
                    const user = auth.currentUser;
                    await db.collection('usuarios').doc(user.uid).update({ avatar: base64 });
                    showMessage("Avatar Actualizado");
                } catch (err) { showMessage("Error al subir imagen"); }
            };
            reader.readAsDataURL(file);
        }

        function closeAllModals() {
            document.getElementById('edit-panel').classList.remove('active');
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('confirm-modal').style.display = 'none';
        }

        function openLogoutModal() { 
            if (window.navigator.vibrate) window.navigator.vibrate([20, 40, 20]);
            document.getElementById('confirm-modal').style.display = 'flex'; 
        }
        function confirmLogout() { auth.signOut().then(() => window.location.href = 'index.html'); }
    </script>
</body>
</html>
